<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex"> 
    <title>dPaul Studio — ERROR 404: Signal Lost</title>
    <style>
        :root {
            --orange: #FF6600;
            --warning: #cc2200;
            --bg: #131413;
            --bg-muted: #1a1c1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;    
            justify-content: center; 
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            padding: 20px;
            color: #fff;
        }

        /* ── CRT EFFECTS ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: 0.35;
        }

        .scanlines {
            position: fixed; inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.15) 50%
            );
            background-size: 100% 4px;
            z-index: 9998;
            pointer-events: none;
        }

        .site-wrap {
            width: min(1200px, 92vw);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            position: relative;
            z-index: 10;
        }

        /* ── EQ SECTION ── */
        .eq-wrap {
            padding: 10px;
            border: 1px solid rgba(255,102,0,0.1);
            border-bottom: none;
            background: rgba(0,0,0,0.3);
            border-radius: 4px 4px 0 0;
        }

        .eq-canvas {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: clamp(100px, 20vw, 300px);
            width: 100%;
            overflow: hidden;
        }

        .bar-col { display: flex; flex-direction: column; gap: 2px; flex: 1; }
        .seg { width: 100%; height: 6px; border-radius: 1px; background: #1a1a1a; transition: background 0.1s; }
        .seg.on { background: var(--orange); box-shadow: 0 0 8px rgba(255,102,0,0.3); }
        .seg.on.mid { background: #aacc00; box-shadow: 0 0 8px rgba(170,204,0,0.3); }
        .seg.on.top { background: var(--warning); box-shadow: 0 0 8px rgba(204,34,0,0.3); }

        /* ── WORDMARK PANEL ── */
        .wordmark-panel {
            width: 100%;
            background: var(--bg);
            border: 2px solid var(--orange);
            border-radius: 0 0 4px 4px;
            padding: clamp(30px, 6vw, 80px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(255,102,0,0.05);
        }

        .wordmark {
            font-weight: 900;
            font-size: clamp(2rem, 10vw, 6.5rem);
            color: #ffffff;
            line-height: 1;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: -0.03em;
            animation: flicker 4s infinite;
        }

        /* Status Message */
        .status-box {
            border-top: 1px solid rgba(255, 102, 0, 0.2);
            padding-top: 24px;
            text-align: center;
            color: var(--orange);
            width: 100%;
            max-width: 500px;
            z-index: 5;
        }

        .status-tag {
            background: var(--warning);
            color: #fff;
            padding: 5px 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            animation: pulse 2s infinite ease-in-out;
        }

        .status-box p {
            line-height: 1.6;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: #c8c8c0;
        }

        /* Home Link Style */
        .home-link {
            color: var(--orange);
            text-decoration: none;
            border-bottom: 1px solid rgba(255,102,0,0.3);
            transition: all 0.2s;
            font-weight: bold;
            padding-bottom: 2px;
        }

        .home-link:hover {
            background: rgba(255,102,0,0.1);
            border-bottom-color: var(--orange);
            color: #fff;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }

        @keyframes flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% { opacity: 1; }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% { opacity: 0.4; }
        }

        .avatar {
            position: absolute;
            right: 5%;
            bottom: -5%;
            height: 100%;
            opacity: 0.15;
            pointer-events: none;
            mix-blend-mode: screen;
        }
        .avatar img { height: 100%; width: auto; object-fit: contain; }

        @media (max-width: 768px) {
            .avatar { display: none; }
            .wordmark-panel { padding: 40px 20px; }
            .bar-col:nth-child(n+15) { display: none; }
        }
    </style>
</head>
<body>

<div class="scanlines"></div>

<div class="site-wrap">
    <div class="eq-wrap">
        <div id="eq" class="eq-canvas"></div>
    </div>

    <div class="wordmark-panel">
        <div class="wordmark">WHOOPS!</div>
        
        <div class="status-box">
            <div class="status-tag">ERROR 404: SIGNAL LOST</div>
            <p>The link you followed has been decommissioned or moved.</p>
            <p style="margin-top: 12px; opacity: 0.8; font-size: 0.85rem; letter-spacing: 0.05em;">
                <a href="/" class="home-link" id="error-return-link">CLICK HERE</a> to return to the main grid
            </p>
        </div>

        <div class="avatar">
            <img src="/assets/man-standing-unhappy.png" alt="dPaul Standing">
        </div>
    </div>
</div>

<script>
    // ── SMART HOME LINK ──
    (function() {
        const returnLink = document.getElementById('error-return-link');
        const repoPath = window.location.pathname.startsWith('/dpaulstudio/') ? '/dpaulstudio' : '';
        
        if (window.innerWidth <= 760) {
            returnLink.href = repoPath + "/m/index.html";
            returnLink.textContent = "TAP HERE";
        } else {
            returnLink.href = repoPath + "/index.html";
        }
    })();

    // ── EQ ANIMATION ──
    const eq = document.getElementById('eq');
    const isMobile = window.innerWidth < 768;
    const NUM_BANDS = isMobile ? 14 : 28;
    const NUM_SEGS  = 15;
    
    const levels = Array.from({length: NUM_BANDS}, () => Math.floor(Math.random() * NUM_SEGS) + 1);
    const targets = [...levels];
    const cols = [];

    for (let b = 0; b < NUM_BANDS; b++) {
        const col = document.createElement('div');
        col.className = 'bar-col';
        const segs = [];
        for (let s = NUM_SEGS - 1; s >= 0; s--) {
            const seg = document.createElement('div');
            seg.className = 'seg';
            col.appendChild(seg);
            segs.push(seg);
        }
        eq.appendChild(col);
        cols.push(segs);
    }

    function renderLevels() {
        for (let b = 0; b < NUM_BANDS; b++) {
            const lv = Math.round(levels[b]);
            cols[b].forEach((seg, i) => {
                const segNum = NUM_SEGS - i;
                if (segNum <= lv) {
                    seg.classList.add('on');
                    if (segNum >= NUM_SEGS) seg.classList.add('top');
                    else if (segNum >= NUM_SEGS - 2) seg.classList.add('mid');
                    else { seg.classList.remove('mid', 'top'); }
                } else {
                    seg.classList.remove('on', 'mid', 'top');
                }
            });
        }
    }

    function animate() {
        for (let b = 0; b < NUM_BANDS; b++) {
            if (Math.random() < 0.08) {
                targets[b] = Math.floor(Math.random() * NUM_SEGS) + 1;
            }
            const diff = targets[b] - levels[b];
            levels[b] += diff * 0.15 + (Math.random() - 0.5) * 0.5;
            levels[b] = Math.max(0.5, Math.min(NUM_SEGS, levels[b]));
        }
        renderLevels();
        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP-ONE MKV — Desktop App</title>
    <style>
        :root {
            --bg: #050505;
            --orange: #FF6600;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Ensure the body takes up the full screen and hides scrollbars */
        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── THE WRAPPER ── 
           This container is exactly the size of your synth.
           centering is handled by the flex body above. */
        .app-container {
            width: 1100px;
            height: 750px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            width: 1100px; /* Exact width from your script */
            height: 750px; /* Exact height from your script */
            border: none;
            background: #000;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            /* This is the secret: it scales from the dead center */
            transform-origin: center center; 
            display: block;
        }

        /* HUD elements */
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #444; font-family: 'Courier New', monospace;
            text-decoration: none; font-size: 11px; text-transform: uppercase;
            letter-spacing: 2px; border: 1px solid #222; padding: 5px 10px;
            z-index: 100;
        }
        .back-link:hover { color: var(--orange); border-color: var(--orange); }

    </style>
</head>
<body>

    <a href="javascript:history.back()" class="back-link">← EXIT_SESSION</a>

    <div class="app-container">
        <iframe 
            src="../music/synths/dpone/dp-one-desktop.html" 
            id="synthFrame"
            allow="midi; midi-sysex; autoplay">
        </iframe>
    </div>

    <script>
        const frame = document.getElementById('synthFrame');
        
        // These MUST match your synth's internal pixel dimensions
        const WIDTH  = 1100;
        const HEIGHT = 750;

        function scaleToFit() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            // Calculate scale to fit with a tiny bit of breathing room (0.95)
            const scale = Math.min(vw / WIDTH, vh / HEIGHT) * 0.95;

            // Apply the transform
            frame.style.transform = `scale(${scale})`;
        }

        // Run on load and resize
        window.addEventListener('load', scaleToFit);
        window.addEventListener('resize', scaleToFit);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPAUL Technologies MKI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a1a;
            font-family: 'Courier New', Courier, monospace;
        }

        .synth-container {
            background: #0a0a0a;
            padding: 20px;
            width: 100%;
            border-bottom: 2px solid #222;
        }

        .synth-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .synth-title {
            color: #cc5500;
            font-size: 20px;
            letter-spacing: 3px;
        }

        .visualizer {
            width: 100%;
            height: 60px;
            background: #000;
            border: 1px solid #333;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .controls-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-section {
            background: #111;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #222;
        }

        .section-label {
            color: #666;
            font-size: 10px;
            text-align: center;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .knob-grid {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .knob {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #333, #111);
            border-radius: 50%;
            border: 2px solid #222;
            cursor: pointer;
            position: relative;
        }

        .knob::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            width: 2px;
            height: 12px;
            background: #cc5500;
            transform: translateX(-50%);
        }

        .knob-label {
            color: #888;
            font-size: 9px;
            text-transform: uppercase;
        }

        .waveform-selector {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .wave-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #666;
            padding: 5px 10px;
            font-size: 10px;
            cursor: pointer;
        }

        .wave-btn.active {
            color: #fff;
            background: #cc5500;
            border-color: #ff6600;
        }

        .keyboard {
            display: flex;
            justify-content: center;
            background: #000;
            padding: 10px;
            border-radius: 4px;
        }

        .key {
            width: 30px;
            height: 100px;
            background: #eee;
            border: 1px solid #000;
            border-radius: 0 0 4px 4px;
            cursor: pointer;
            position: relative;
        }

        .key.black {
            width: 20px;
            height: 60px;
            background: #222;
            margin-left: -10px;
            margin-right: -10px;
            z-index: 2;
        }

        .key.playing {
            background: #cc5500 !important;
        }
    </style>
</head>
<body>

<div class="synth-container">
    <div class="synth-header">
        <div class="synth-title">DPAUL SYNTH</div>
        <div style="color: #444; font-size: 12px;">ANALOG MONOSYNTH v1.0</div>
    </div>

    <canvas id="scope" class="visualizer"></canvas>

    <div class="controls-panel">
        <div class="control-section">
            <div class="section-label">Oscillator</div>
            <div class="waveform-selector">
                <button class="wave-btn active" onclick="setWave('sawtooth', this)">SAW</button>
                <button class="wave-btn" onclick="setWave('square', this)">SQR</button>
                <button class="wave-btn" onclick="setWave('triangle', this)">TRI</button>
            </div>
            <div class="knob-grid" style="margin-top: 15px;">
                <div class="knob-container">
                    <div class="knob" id="detuneKnob" style="transform: rotate(0deg);"></div>
                    <div class="knob-label">Detune</div>
                </div>
            </div>
        </div>

        <div class="control-section">
            <div class="section-label">Filter</div>
            <div class="knob-grid">
                <div class="knob-container">
                    <div class="knob" id="cutoffKnob" style="transform: rotate(45deg);"></div>
                    <div class="knob-label">Cutoff</div>
                </div>
                <div class="knob-container">
                    <div class="knob" id="resKnob" style="transform: rotate(-45deg);"></div>
                    <div class="knob-label">Res</div>
                </div>
            </div>
        </div>

        <div class="control-section">
            <div class="section-label">Envelope</div>
            <div class="knob-grid">
                <div class="knob-container">
                    <div class="knob" id="attackKnob" style="transform: rotate(-100deg);"></div>
                    <div class="knob-label">A</div>
                </div>
                <div class="knob-container">
                    <div class="knob" id="releaseKnob" style="transform: rotate(-45deg);"></div>
                    <div class="knob-label">R</div>
                </div>
            </div>
        </div>
    </div>

    <div class="keyboard" id="keyboard"></div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const masterGain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    
    let currentWave = 'sawtooth';
    let attackTime = 0.1;
    let releaseTime = 0.5;
    let activeOscillators = {};

    masterGain.connect(audioCtx.destination);
    filter.connect(masterGain);
    masterGain.gain.value = 0.5;
    filter.type = 'lowpass';
    filter.frequency.value = 2000;

    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const keyboard = document.getElementById('keyboard');

    for (let i = 0; i < 24; i++) {
        const note = notes[i % 12];
        const isBlack = note.includes('#');
        const key = document.createElement('div');
        key.className = `key ${isBlack ? 'black' : ''}`;
        const freq = 110 * Math.pow(2, i / 12);
        key.onmousedown = () => playNote(freq, key);
        key.onmouseup = () => stopNote(key);
        key.onmouseleave = () => stopNote(key);
        keyboard.appendChild(key);
    }

    function playNote(freq, element) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const vca = audioCtx.createGain();
        osc.type = currentWave;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        vca.gain.setValueAtTime(0, audioCtx.currentTime);
        vca.gain.linearRampToValueAtTime(1, audioCtx.currentTime + attackTime);
        osc.connect(vca);
        vca.connect(filter);
        osc.start();
        element.classList.add('playing');
        activeOscillators[freq] = { osc, vca };
    }

    function stopNote(element) {
        element.classList.remove('playing');
        for (let f in activeOscillators) {
            const { osc, vca } = activeOscillators[f];
            vca.gain.cancelScheduledValues(audioCtx.currentTime);
            vca.gain.setValueAtTime(vca.gain.value, audioCtx.currentTime);
            vca.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + releaseTime);
            osc.stop(audioCtx.currentTime + releaseTime + 0.1);
            delete activeOscillators[f];
        }
    }

    function setWave(wave, btn) {
        currentWave = wave;
        document.querySelectorAll('.wave-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    const canvas = document.getElementById('scope');
    const canvasCtx = canvas.getContext('2d');
    const analyser = audioCtx.createAnalyser();
    masterGain.connect(analyser);

    function draw() {
        requestAnimationFrame(draw);
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(data);
        canvasCtx.fillStyle = '#000';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 2;
        canvasCtx.strokeStyle = '#cc5500';
        canvasCtx.beginPath();
        const sliceWidth = canvas.width / data.length;
        let x = 0;
        for (let i = 0; i < data.length; i++) {
            const v = data[i] / 128.0;
            const y = v * canvas.height / 2;
            if (i === 0) canvasCtx.moveTo(x, y);
            else canvasCtx.lineTo(x, y);
            x += sliceWidth;
        }
        canvasCtx.stroke();
    }
    draw();

    function setupKnob(id, min, max, callback) {
        const knob = document.getElementById(id);
        let val = 0;
        knob.onmousedown = (e) => {
            let startY = e.clientY;
            document.onmousemove = (e) => {
                let delta = startY - e.clientY;
                val = Math.max(-150, Math.min(150, val + delta));
                knob.style.transform = `rotate(${val}deg)`;
                let normalized = (val + 150) / 300;
                callback(min + (normalized * (max - min)));
                startY = e.clientY;
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    }

    setupKnob('cutoffKnob', 50, 5000, (v) => filter.frequency.value = v);
    setupKnob('resKnob', 0.1, 20, (v) => filter.Q.value = v);
    setupKnob('attackKnob', 0.01, 2, (v) => attackTime = v);
    setupKnob('releaseKnob', 0.1, 3, (v) => releaseTime = v);
</script>
</body>
</html>

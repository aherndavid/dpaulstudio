<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPAUL Technologies MKI</title>
    <style>
        :root {
            --orange: #FF6600;
            --bg: #0a0a0a;
            --panel: #121212;
            --border: #1a1a1a;
            --white-key: #d1d1d1;
            --black-key: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

        body {
    background: #000;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: unset;
    padding: 16px 0;
}

        /* ── THE CHASSIS ── */
        .synth-chassis {
            background: var(--bg);
            width: 95%;
            max-width: 550px;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .synth-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .synth-title { color: var(--orange); font-size: 1.4rem; letter-spacing: 3px; font-weight: bold; }
        .synth-ver { color: #444; font-size: 0.7rem; text-transform: uppercase; }

        .visualizer {
            width: 100%;
            height: 70px;
            background: #000;
            border: 1px solid #1a1a1a;
            display: block;
        }

        /* ── CONTROLS ── */
        .controls-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .control-section {
            background: var(--panel);
            padding: 15px;
            border: 1px solid #222;
            border-radius: 6px;
        }

        .control-section.osc { grid-column: span 2; }

        .section-label {
            color: #555;
            font-size: 0.65rem;
            text-align: center;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .knob-grid { display: flex; justify-content: space-around; }

        .knob-container { display: flex; flex-direction: column; align-items: center; gap: 6px; }

        .knob {
            width: 38px; height: 38px;
            background: radial-gradient(circle at 30% 30%, #333, #000);
            border-radius: 50%;
            border: 2px solid #222;
            position: relative;
            cursor: ns-resize;
        }

        .knob::after {
            content: ''; position: absolute; top: 5px; left: 50%;
            width: 2px; height: 12px; background: var(--orange);
            transform: translateX(-50%);
        }

        .knob-label { color: #666; font-size: 0.6rem; text-transform: uppercase; }

        .waveform-selector { display: flex; gap: 6px; justify-content: center; }
        .wave-btn {
            background: #1a1a1a; border: 1px solid #333; color: #666;
            padding: 6px 12px; font-size: 0.7rem; cursor: pointer; font-family: inherit;
        }
        .wave-btn.active { color: #fff; background: var(--orange); border-color: var(--orange); }

        /* ── KEYBOARD: THE FIX ── */
        .keyboard {
            display: flex;
            width: 100%;
            height: 120px;
            background: #000;
            padding: 0;
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            border: 2px solid #000;
        }

        .key.white {
            flex: 1;
            background: var(--white-key);
            border-right: 1px solid #bbb;
            position: relative;
            z-index: 1;
            border-radius: 0 0 4px 4px;
        }

        .key.black {
            position: absolute;
            background: var(--black-key);
            width: 7%; /* Thinner, realistic width */
            height: 60%;
            z-index: 10;
            border-radius: 0 0 3px 3px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .key.playing { background: var(--orange) !important; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); }

    </style>
</head>
<body>

<div class="synth-chassis">
    <div class="synth-header">
        <div class="synth-title">DPAUL SYNTH</div>
        <div class="synth-ver">MKI // ANALOG MONO</div>
    </div>

    <canvas id="scope" class="visualizer"></canvas>

    <div class="controls-panel">
        <div class="control-section osc">
            <div class="section-label">Oscillator</div>
            <div class="waveform-selector">
                <button class="wave-btn active" onclick="setWave('sawtooth', this)">SAW</button>
                <button class="wave-btn" onclick="setWave('square', this)">SQR</button>
                <button class="wave-btn" onclick="setWave('triangle', this)">TRI</button>
            </div>
        </div>

        <div class="control-section">
            <div class="section-label">Filter</div>
            <div class="knob-grid">
                <div class="knob-container">
                    <div class="knob" id="cutoffKnob"></div>
                    <div class="knob-label">Cutoff</div>
                </div>
                <div class="knob-container">
                    <div class="knob" id="resKnob"></div>
                    <div class="knob-label">Res</div>
                </div>
            </div>
        </div>

        <div class="control-section">
            <div class="section-label">Envelope</div>
            <div class="knob-grid">
                <div class="knob-container">
                    <div class="knob" id="attackKnob"></div>
                    <div class="knob-label">A</div>
                </div>
                <div class="knob-container">
                    <div class="knob" id="releaseKnob"></div>
                    <div class="knob-label">R</div>
                </div>
            </div>
        </div>
    </div>

    <div class="keyboard" id="keyboard"></div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const masterGain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    
    let currentWave = 'sawtooth';
    let attackTime = 0.1;
    let releaseTime = 0.5;
    let activeOscillators = {};

    masterGain.connect(audioCtx.destination);
    filter.connect(masterGain);
    masterGain.gain.value = 0.4;
    filter.type = 'lowpass';
    filter.frequency.value = 2000;

    // ── KEYBOARD GENERATION ──
    const keyboard = document.getElementById('keyboard');
    const whiteKeysCount = 8;
    const blackKeyPositions = [0, 1, 3, 4, 5]; // Indexes where a black key follows a white key
    
    // Create White Keys first
    for (let i = 0; i < whiteKeysCount; i++) {
        const key = document.createElement('div');
        key.className = 'key white';
        const freq = 220 * Math.pow(2, (i === 7 ? 12 : [0,2,4,5,7,9,11][i]) / 12);
        
        setupKeyListeners(key, freq);
        keyboard.appendChild(key);
    }

    // Create Black Keys (Positioned Absolutely)
    const whiteKeyWidth = 100 / whiteKeysCount;
    blackKeyPositions.forEach((pos, index) => {
        const blackKey = document.createElement('div');
        blackKey.className = 'key black';
        // Position them between white keys (offset by half a black key width)
        blackKey.style.left = `${(whiteKeyWidth * (pos + 1)) - 3.5}%`;
        
        const blackKeyIntervals = [1, 3, 6, 8, 10];
        const freq = 220 * Math.pow(2, blackKeyIntervals[index] / 12);
        
        setupKeyListeners(blackKey, freq);
        keyboard.appendChild(blackKey);
    });

    function setupKeyListeners(el, freq) {
        const start = (e) => { e.preventDefault(); playNote(freq, el); };
        const end = (e) => { e.preventDefault(); stopNote(freq, el); };
        el.addEventListener('mousedown', start);
        el.addEventListener('touchstart', start);
        el.addEventListener('mouseup', end);
        el.addEventListener('touchend', end);
        el.addEventListener('mouseleave', end);
    }

    function playNote(freq, element) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (activeOscillators[freq]) return;
        const osc = audioCtx.createOscillator();
        const vca = audioCtx.createGain();
        osc.type = currentWave;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        vca.gain.setValueAtTime(0, audioCtx.currentTime);
        vca.gain.linearRampToValueAtTime(1, audioCtx.currentTime + attackTime);
        osc.connect(vca); vca.connect(filter);
        osc.start();
        element.classList.add('playing');
        activeOscillators[freq] = { osc, vca };
    }

    function stopNote(freq, element) {
        if (!activeOscillators[freq]) return;
        const { osc, vca } = activeOscillators[freq];
        element.classList.remove('playing');
        vca.gain.cancelScheduledValues(audioCtx.currentTime);
        vca.gain.setValueAtTime(vca.gain.value, audioCtx.currentTime);
        vca.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + releaseTime);
        osc.stop(audioCtx.currentTime + releaseTime + 0.1);
        delete activeOscillators[freq];
    }

    function setWave(wave, btn) {
        currentWave = wave;
        document.querySelectorAll('.wave-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // Visualizer Logic
    const canvas = document.getElementById('scope');
    const canvasCtx = canvas.getContext('2d');
    const analyser = audioCtx.createAnalyser();
    masterGain.connect(analyser);

    function draw() {
        requestAnimationFrame(draw);
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(data);
        canvasCtx.fillStyle = '#000';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 2; canvasCtx.strokeStyle = '#FF6600';
        canvasCtx.beginPath();
        const sliceWidth = canvas.width / data.length;
        let x = 0;
        for (let i = 0; i < data.length; i++) {
            const v = data[i] / 128.0;
            const y = v * canvas.height / 2;
            if (i === 0) canvasCtx.moveTo(x, y);
            else canvasCtx.lineTo(x, y);
            x += sliceWidth;
        }
        canvasCtx.stroke();
    }
    draw();

    // Knob Logic
    function setupKnob(id, min, max, initial, callback) {
        const knob = document.getElementById(id);
        let val = initial;
        const move = (e) => {
            e.preventDefault();
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            if (!knob.startY) knob.startY = clientY;
            let delta = knob.startY - clientY;
            val = Math.max(-135, Math.min(135, val + delta));
            knob.style.transform = `rotate(${val}deg)`;
            let normalized = (val + 135) / 270;
            callback(min + (normalized * (max - min)));
            knob.startY = clientY;
        };
        const stop = () => { knob.startY = null; window.removeEventListener('mousemove', move); window.removeEventListener('touchmove', move); };
        knob.addEventListener('mousedown', (e) => { knob.startY = e.clientY; window.addEventListener('mousemove', move); window.addEventListener('mouseup', stop); });
        knob.addEventListener('touchstart', (e) => { knob.startY = e.touches[0].clientY; window.addEventListener('touchmove', move); window.addEventListener('touchend', stop); });
        knob.style.transform = `rotate(${val}deg)`;
    }

    setupKnob('cutoffKnob', 50, 8000, 45, (v) => filter.frequency.value = v);
    setupKnob('resKnob', 0.1, 20, -45, (v) => filter.Q.value = v);
    setupKnob('attackKnob', 0.01, 1, -100, (v) => attackTime = v);
    setupKnob('releaseKnob', 0.1, 2, -45, (v) => releaseTime = v);
</script>
</body>
</html>

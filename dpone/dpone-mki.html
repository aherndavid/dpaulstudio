<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPAUL Technologies MKI</title>
    <style>
        :root {
            --orange: #FF6600;
            --bg: #0a0a0a;
            --panel: #121212;
            --border: #1a1a1a;
            --white-key: #d1d1d1;
            --black-key: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

        body {
            background: transparent; /* Changed to blend with main page */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center; /* Centered vertically */
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .synth-chassis {
            background: var(--bg);
            width: 95%;
            max-width: 550px;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin: auto;
        }

        .synth-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .synth-title { color: var(--orange); font-size: 1.4rem; letter-spacing: 3px; font-weight: bold; }
        .synth-ver { color: #444; font-size: 0.7rem; text-transform: uppercase; }

        .visualizer {
            width: 100%;
            height: 70px;
            background: #000;
            border: 1px solid #1a1a1a;
            display: block;
        }

        .controls-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .control-section {
            background: var(--panel);
            padding: 15px;
            border: 1px solid #222;
            border-radius: 6px;
        }

        .control-section.osc { grid-column: span 2; }
        .section-label { color: #555; font-size: 0.65rem; text-align: center; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .knob-grid { display: flex; justify-content: space-around; }
        .knob-container { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .knob { width: 38px; height: 38px; background: radial-gradient(circle at 30% 30%, #333, #000); border-radius: 50%; border: 2px solid #222; position: relative; cursor: ns-resize; }
        .knob::after { content: ''; position: absolute; top: 5px; left: 50%; width: 2px; height: 12px; background: var(--orange); transform: translateX(-50%); }
        .knob-label { color: #666; font-size: 0.6rem; text-transform: uppercase; }

        .waveform-selector { display: flex; gap: 6px; justify-content: center; }
        .wave-btn { background: #1a1a1a; border: 1px solid #333; color: #666; padding: 6px 12px; font-size: 0.7rem; cursor: pointer; font-family: inherit; }
        .wave-btn.active { color: #fff; background: var(--orange); border-color: var(--orange); }

        .keyboard { display: flex; width: 100%; height: 120px; background: #000; padding: 0; position: relative; border-radius: 4px; overflow: hidden; border: 2px solid #000; }
        .key.white { flex: 1; background: var(--white-key); border-right: 1px solid #bbb; position: relative; z-index: 1; border-radius: 0 0 4px 4px; }
        .key.black { position: absolute; background: var(--black-key); width: 7%; height: 60%; z-index: 10; border-radius: 0 0 3px 3px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .key.playing { background: var(--orange) !important; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="synth-chassis">
    <div class="synth-header">
        <div class="synth-title">DPAUL SYNTH</div>
        <div class="synth-ver">MKI // ANALOG MONO</div>
    </div>
    <canvas id="scope" class="visualizer"></canvas>
    <div class="controls-panel">
        <div class="control-section osc">
            <div class="section-label">Oscillator</div>
            <div class="waveform-selector">
                <button class="wave-btn active" onclick="setWave('sawtooth', this)">SAW</button>
                <button class="wave-btn" onclick="setWave('square', this)">SQR</button>
                <button class="wave-btn" onclick="setWave('triangle', this)">TRI</button>
            </div>
        </div>
        <div class="control-section">
            <div class="section-label">Filter</div>
            <div class="knob-grid">
                <div class="knob-container">
                    <div class="knob" id="cutoffKnob"></div>
                    <div class="knob-label">Cutoff</div>
                </div>
                <div class="knob-container">
                    <div class="knob" id="resKnob"></div>
                    <div class="knob-label">Res</div>
                </div>
            </div>
        </div>
        <div class="control-section">
            <div class="section-label">Envelope</div>
            <div class="knob-grid">
                <div class="knob-container">
                    <div class="knob" id="attackKnob"></div>
                    <div class="knob-label">A</div>
                </div>
                <div class="knob-container">
                    <div class="knob" id="releaseKnob"></div>
                    <div class="knob-label">R</div>
                </div>
            </div>
        </div>
    </div>
    <div class="keyboard" id="keyboard"></div>
</div>

<script>
    // Existing Audio and Knob Logic remains unchanged...
</script>
</body>
</html>

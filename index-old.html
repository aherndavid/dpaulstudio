<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dpaul.studio</title>

    <style>
        :root {
            --bg:      #0F1010;
            --orange:  #FF6600;
            --cream:   #D4C4A8;
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: var(--cream);
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: 0.35;
        }

        /* ── BRAND GROUP ── */
        #brand-group {
            position: absolute;
            top: 60px;
            left: 60px;
            z-index: 10;
        }

        #eq-container {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 36px;
            margin-bottom: 18px;
        }

        .eq-bar {
            width: 4px;
            background: var(--orange);
            transition: height 0.1s ease;
        }

        .wordmark {
            font-size: clamp(5.5rem, 16vw, 14rem);
            font-weight: 700;
            line-height: 0.85;
            color: #FFFFFF;
            letter-spacing: -0.05em;
            text-transform: lowercase;
        }

        .wordmark .accent { color: var(--orange); }

        /* ── HORIZONTAL NAV ── */
        #nav-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            margin-top: 28px;
        }

        .nav-link {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.45);
            font-size: clamp(0.75rem, 1.4vw, 1.1rem);
            font-weight: 700;
            text-transform: lowercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
            transition: color 0.2s ease;
            padding-right: 28px;
        }

        .nav-link:hover {
            color: var(--orange);
        }

        @media (max-width: 768px) {
            #brand-group {
                top: 40px;
                left: 30px;
            }
            .wordmark {
                font-size: clamp(4.5rem, 18vw, 7rem);
            }
            #nav-bar {
                margin-top: 20px;
                gap: 0;
            }
            .nav-link {
                font-size: clamp(0.7rem, 3.5vw, 0.9rem);
                padding-right: 18px;
            }
        }
    </style>
</head>
<body>

    <div id="brand-group">
        <div id="eq-container"></div>
        <div class="wordmark">
            <span class="accent">d</span>paul<br>.studio
        </div>
        <nav id="nav-bar">
            <a href="design.html"    class="nav-link">design</a>
            <a href="merch.html"     class="nav-link">merch</a>
            <a href="music.html"     class="nav-link">music</a>
            <a href="synths.html"    class="nav-link">synths</a>
            <a href="tools.html"     class="nav-link">tools</a>
            <a href="video.html"     class="nav-link">video</a>
            <a href="dev-tools.html" class="nav-link">dev tools</a>
            <a href="about.html"     class="nav-link">about</a>
        </nav>
    </div>

    <script>
        const NUM_BANDS = 10;
        const MAX_H     = 36;
        const container = document.getElementById('eq-container');
        const levels    = Array.from({ length: NUM_BANDS }, () => Math.random() * MAX_H + 5);
        const targets   = [...levels];
        const bars      = [];

        for (let i = 0; i < NUM_BANDS; i++) {
            const b = document.createElement('div');
            b.className = 'eq-bar';
            b.style.height = levels[i] + 'px';
            container.appendChild(b);
            bars.push(b);
        }

        (function animate() {
            for (let i = 0; i < NUM_BANDS; i++) {
                if (Math.random() < 0.08) targets[i] = Math.random() * MAX_H + 5;
                levels[i] += (targets[i] - levels[i]) * 0.12;
                bars[i].style.height = levels[i].toFixed(1) + 'px';
            }
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>

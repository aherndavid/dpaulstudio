<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dpaul.studio</title>

    <style>
        :root {
            --bg:      #0F1010;
            --orange:  #FF6600;
            --cream:   #D4C4A8;
            --border:  rgba(255,102,0,0.12);
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: var(--cream);
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: 0.35;
        }

        #app {
            display: grid;
            grid-template-rows: 60px 1fr;
            grid-template-columns: 1fr 360px;
            width: 100%;
            height: 100vh;
        }

        #topbar {
            grid-column: 1 / -1;
            grid-row: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        #topbar-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        #eq-corner {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 20px;
        }

        .eq-bar-mini {
            width: 3px;
            border-radius: 1px;
            background: var(--orange);
            transition: height 0.06s linear;
        }

        .topbar-brand {
            font-size: 0.63rem;
            color: rgba(212,196,168,0.3);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        #topbar-right {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .topbar-link {
            font-size: 0.62rem;
            color: rgba(212,196,168,0.25);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            text-decoration: none;
            transition: color 0.15s;
        }

        .topbar-link:hover { color: var(--orange); }

        .topbar-status {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.6rem;
            color: rgba(255,102,0,0.5);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .status-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--orange);
            animation: blink 2.4s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        #stage {
            grid-column: 1;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            padding: 60px 80px;
            position: relative;
            overflow: hidden;
        }

        #stage::before {
            content: '';
            position: absolute;
            left: -100px; top: 50%;
            transform: translateY(-50%);
            width: 900px; height: 900px;
            background: radial-gradient(ellipse, rgba(255,102,0,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .wordmark {
            font-size: clamp(6rem, 11vw, 13rem);
            font-weight: 700;
            line-height: 0.86;
            color: #EDE5D7;
            letter-spacing: -0.045em;
            z-index: 2; position: relative;
        }

        .wordmark .accent { color: var(--orange); }

        .wordmark-sub {
            margin-top: 32px;
            font-size: clamp(1rem, 1.6vw, 1.5rem);
            color: rgba(212,196,168,0.22);
            letter-spacing: 0.1em;
            z-index: 2; position: relative;
        }

        .divider {
            width: 64px;
            height: 1px;
            background: rgba(255,102,0,0.3);
            margin: 44px 0;
            z-index: 2; position: relative;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 2; position: relative;
        }

        .tag {
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(212,196,168,0.22);
            border: 1px solid rgba(255,102,0,0.1);
            padding: 7px 16px;
            border-radius: 2px;
            transition: color 0.2s, border-color 0.2s;
            cursor: default;
        }

        .tag:hover {
            color: var(--orange);
            border-color: rgba(255,102,0,0.35);
        }

        #nav-panel {
            grid-column: 2;
            grid-row: 2;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 48px;
        }

        .nav-panel-label {
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(212,196,168,0.2);
            margin-bottom: 24px;
        }

        #nav-list {
            display: flex;
            flex-direction: column;
        }

        .nav-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            text-decoration: none;
            color: rgba(212,196,168,0.32);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.05rem;
            letter-spacing: 0.08em;
            text-transform: lowercase;
            border-bottom: 1px solid rgba(255,102,0,0.07);
            transition: color 0.15s, padding-left 0.2s;
            cursor: pointer;
        }

        .nav-link:first-child {
            border-top: 1px solid rgba(255,102,0,0.07);
        }

        .nav-link-inner {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .nav-index {
            font-size: 0.52rem;
            color: rgba(212,196,168,0.15);
            letter-spacing: 0.1em;
            width: 18px;
            flex-shrink: 0;
            transition: color 0.15s;
        }

        .nav-arrow {
            font-size: 0.9rem;
            opacity: 0;
            color: var(--orange);
            transition: opacity 0.18s, transform 0.18s;
            transform: translateX(-6px);
        }

        .nav-link:hover {
            color: var(--orange);
            padding-left: 6px;
        }

        .nav-link:hover .nav-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .nav-link:hover .nav-index {
            color: rgba(255,102,0,0.4);
        }

        .nav-link.active {
            color: var(--orange);
        }

        .nav-link.active .nav-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .nav-link.active .nav-index {
            color: rgba(255,102,0,0.4);
        }
    </style>
</head>
<body>

<div id="app">

    <div id="topbar">
        <div id="topbar-left">
            <div id="eq-corner"></div>
            <div class="topbar-brand">dPaul Technologies</div>
        </div>
        <div id="topbar-right">
            <a href="about.html" class="topbar-link">about</a>
            <a href="mailto:hello@dpaul.studio" class="topbar-link">contact</a>
            <div class="topbar-status">
                <span class="status-dot"></span>available for work
            </div>
        </div>
    </div>

    <main id="stage">
        <div class="wordmark">
            <span class="accent">d</span>paul<br>.studio
        </div>
        <div class="wordmark-sub">design · music · code · video</div>
        <div class="divider"></div>
        <div class="tag-row">
            <span class="tag">Branding</span>
            <span class="tag">Merch</span>
            <span class="tag">Audio</span>
            <span class="tag">Synthesis</span>
            <span class="tag">Motion</span>
            <span class="tag">Dev Tools</span>
        </div>
    </main>

    <nav id="nav-panel">
        <div class="nav-panel-label">navigate</div>
        <div id="nav-list">
            <a href="design.html"    class="nav-link"><span class="nav-link-inner"><span class="nav-index">01</span>design</span><span class="nav-arrow">→</span></a>
            <a href="merch.html"     class="nav-link"><span class="nav-link-inner"><span class="nav-index">02</span>merch</span><span class="nav-arrow">→</span></a>
            <a href="music.html"     class="nav-link"><span class="nav-link-inner"><span class="nav-index">03</span>music</span><span class="nav-arrow">→</span></a>
            <a href="synths.html"    class="nav-link"><span class="nav-link-inner"><span class="nav-index">04</span>synths</span><span class="nav-arrow">→</span></a>
            <a href="tools.html"     class="nav-link"><span class="nav-link-inner"><span class="nav-index">05</span>tools</span><span class="nav-arrow">→</span></a>
            <a href="video.html"     class="nav-link"><span class="nav-link-inner"><span class="nav-index">06</span>video</span><span class="nav-arrow">→</span></a>
            <a href="dev-tools.html" class="nav-link"><span class="nav-link-inner"><span class="nav-index">07</span>dev tools</span><span class="nav-arrow">→</span></a>
            <a href="about.html"     class="nav-link"><span class="nav-link-inner"><span class="nav-index">08</span>about</span><span class="nav-arrow">→</span></a>
        </div>
    </nav>

</div>

<script>
    const NUM_BANDS = 16;
    const MAX_H     = 20;
    const corner    = document.getElementById('eq-corner');
    const levels    = Array.from({ length: NUM_BANDS }, () => Math.random() * MAX_H + 2);
    const targets   = [...levels];
    const bars      = [];

    for (let i = 0; i < NUM_BANDS; i++) {
        const b = document.createElement('div');
        b.className = 'eq-bar-mini';
        b.style.height = levels[i] + 'px';
        const pos = i / (NUM_BANDS - 1);
        b.style.background = pos > 0.75 ? '#cc3300' : pos > 0.55 ? '#aacc00' : '#FF6600';
        corner.appendChild(b);
        bars.push(b);
    }

    (function tick() {
        for (let i = 0; i < NUM_BANDS; i++) {
            if (Math.random() < 0.06) targets[i] = Math.random() * MAX_H + 2;
            levels[i] += (targets[i] - levels[i]) * 0.18;
            levels[i]  = Math.max(2, Math.min(MAX_H, levels[i]));
            bars[i].style.height = levels[i].toFixed(1) + 'px';
        }
        requestAnimationFrame(tick);
    })();

    const current = location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.nav-link').forEach(link => {
        if (link.getAttribute('href') === current) link.classList.add('active');
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <title>dpaul.studio</title>

    <style>
        :root {
            --bg:      #161616;
            --orange:  #e6432a;
            --cream:   #f4f3ef;
            --border:  rgba(230,67,42,0.25);
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%; height: 100%;
            background-color: var(--bg);
            background-image: url("assets/desk-phone.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-blend-mode: luminosity;
            font-family:'JetBrains Mono', monospace;
            overflow-x: hidden;
            color: var(--cream);
        }

        body {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(15, 16, 16, 0.85);
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: 0.35;
        }

        /* ── BRAND GROUP ── */
        #brand-group {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .eq-bar {
            width: 7px;
            background: var(--orange);
            transition: height 0.1s ease;
            flex-shrink: 0;
        }

        .wordmark {
            font-family:'Anton', sans-serif;
            font-size: clamp(4.5rem, 15vw, 13rem);
            font-weight: 400;
            line-height: 0.85;
            color: #FFFFFF;
            letter-spacing: 0;
            text-transform: lowercase;
        }

        .wordmark .accent {
            color: var(--orange);
            position: relative;
            display: inline-block;
        }

        #eq-container {
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 100%;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 36px;
            pointer-events: none;
            overflow: hidden;
        }

        /* ── NAVIGATION & HAMBURGER ── */
        .nav-toggle {
            display: none;
            background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: var(--cream);
            width: 44px; height: 44px; cursor: pointer; border-radius: 0;
            align-items: center; justify-content: center; transition: all 0.15s;
            margin: 20px auto 0 auto;
        }
        .nav-toggle:hover { border-color: var(--orange); color: var(--orange); }

        #nav-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 0;
            margin-top: 36px;
            align-self: center;
            max-width: 900px;
        }

        .nav-link {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.45);
            font-size: clamp(0.9rem, 1.8vw, 1.4rem);
            font-weight: 700;
            text-transform: lowercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
            transition: color 0.2s ease;
            padding: 4px 16px;
        }

        .nav-link:hover { color: var(--orange); }

        @media (max-width: 768px) {
            html, body { overflow-y: auto; }
            body { align-items: center; padding: 20px 0; }
            #brand-group { width: 95%; }
            .wordmark { font-size: clamp(3.8rem, 16vw, 6.5rem); }
            
            .nav-toggle { display: flex; }
            #nav-bar {
                display: none;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                background: rgba(23, 23, 23, 0.95);
                border: 1px solid var(--border);
                padding: 16px;
                margin-top: 16px;
                width: 100%;
                max-width: 280px;
                box-shadow: 0 12px 24px rgba(0,0,0,0.5);
            }
            #nav-bar.open { display: flex; }
            .nav-link { font-size: 1.1rem; padding: 8px 12px; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="brand-group">
        <div class="wordmark">
            <span class="accent"><div id="eq-container"></div>d</span>paul<br>.studio
        </div>
        
        <button class="nav-toggle" id="navToggle" onclick="toggleMobileNav()" aria-label="Toggle menu" aria-expanded="false">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="3" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>

        <nav id="nav-bar">
            <a href="about.html" class="nav-link" data-i18n="nav_about">about</a>
            <a href="current.html" class="nav-link">current</a>
            <a href="design.html" class="nav-link" data-i18n="nav_design">design</a>
            <a href="fun.html" class="nav-link">fun</a>
            <a href="merch.html" class="nav-link" data-i18n="nav_merch">merch</a>
            <a href="music.html" class="nav-link" data-i18n="nav_music">music</a>
            <a href="services.html" class="nav-link">services</a>
            <a href="software.html" class="nav-link">software</a>
            <a href="synths.html" class="nav-link" data-i18n="nav_synths">synths</a>
            <a href="tools.html" class="nav-link" data-i18n="nav_tools">tools</a>
            <a href="video.html" class="nav-link" data-i18n="nav_video">video</a>
        </nav>
    </div>

    <!-- Mobile Menu Toggle Script -->
    <script>
        function toggleMobileNav() {
            const navBar = document.getElementById('nav-bar');
            const navToggle = document.getElementById('navToggle');
            const isOpen = navBar.classList.toggle('open');
            navToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        }

        // Close when clicking outside
        document.addEventListener('click', function(e) {
            const navBar = document.getElementById('nav-bar');
            const navToggle = document.getElementById('navToggle');
            if (navBar.classList.contains('open') && !navBar.contains(e.target) && !navToggle.contains(e.target)) {
                navBar.classList.remove('open');
                navToggle.setAttribute('aria-expanded', 'false');
            }
        });
    </script>

    <!-- i18n engine -->
    <script src="assets/translations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', I18N.init);
    </script>

    <!-- EQ animation -->
    <script>
        const NUM_BANDS = 10;
        const MAX_H     = 36;
        const container = document.getElementById('eq-container');
        const levels    = Array.from({ length: NUM_BANDS }, () => Math.random() * MAX_H + 5);
        const targets   = [...levels];
        const bars      = [];

        for (let i = 0; i < NUM_BANDS; i++) {
            const b = document.createElement('div');
            b.className = 'eq-bar';
            b.style.height = levels[i] + 'px';
            container.appendChild(b);
            bars.push(b);
        }

        (function animate() {
            for (let i = 0; i < NUM_BANDS; i++) {
                if (Math.random() < 0.08) targets[i] = Math.random() * MAX_H + 5;
                levels[i] += (targets[i] - levels[i]) * 0.12;
                bars[i].style.height = levels[i].toFixed(1) + 'px';
            }
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>

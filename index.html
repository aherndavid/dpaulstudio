<!DOCTYPE html>
<html lang="en">
<head>
    <script>
  if (/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
      || window.innerWidth <= 768) {
    window.location.replace('m/index.html');
  }
</script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dpaul.studio</title>

    <style>
        :root {
            --bg:      #0F1010;
            --orange:  #FF6600;
            --cream:   #D4C4A8;
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%; height: 100%;
            background-color: var(--bg);
            /* --- ADDED BACKGROUND IMAGE CONFIG --- */
            background-image: url("assets/desk-phone.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-blend-mode: luminosity; /* Blends the image into the dark background */
            /* -------------------------------------- */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: var(--cream);
        }

        /* Adjusted to make the image slightly transparent/subtle */
        body {
            position: relative;
        }
        
        /* Subtle overlay to dim the image so text stays readable */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(15, 16, 16, 0.85); /* Adjust 0.85 to make image clearer or darker */
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: 0.35;
        }

        /* ── BRAND GROUP ── */
        #brand-group {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Text shadow added to help text pop against the background image */
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .eq-bar {
            width: 9px;
            background: var(--orange);
            transition: height 0.1s ease;
            flex-shrink: 0;
        }

        .wordmark {
            font-size: clamp(5.5rem, 16vw, 14rem);
            font-weight: 700;
            line-height: 0.85;
            color: #FFFFFF;
            letter-spacing: -0.05em;
            text-transform: lowercase;
        }

        .wordmark .accent {
            color: var(--orange);
            position: relative;
            display: inline-block;
        }

        #eq-container {
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 100%;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 36px;
            pointer-events: none;
            overflow: hidden;
        }

        /* ── HORIZONTAL NAV ── */
        #nav-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0;
            margin-top: 28px;
            align-self: center;
        }

        .nav-link {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.45);
            font-size: clamp(1rem, 2vw, 1.6rem);
            font-weight: 700;
            text-transform: lowercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
            transition: color 0.2s ease;
            padding: 0 20px;
        }

        .nav-link:hover {
            color: var(--orange);
        }

        @media (max-width: 768px) {
            #brand-group {
                width: 90%;
            }
            .wordmark {
                font-size: clamp(4.5rem, 18vw, 7rem);
            }
            #nav-bar {
                margin-top: 20px;
            }
            .nav-link {
                font-size: clamp(0.85rem, 4vw, 1.1rem);
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>

    <div id="brand-group">
        <div class="wordmark">
            <span class="accent"><div id="eq-container"></div>d</span>paul<br>.studio
        </div>
        <nav id="nav-bar">
            <a href="design.html"    class="nav-link">design</a>
            <a href="merch.html"     class="nav-link">merch</a>
            <a href="music.html"     class="nav-link">music</a>
            <a href="synths.html"    class="nav-link">synths</a>
            <a href="tools.html"     class="nav-link">tools</a>
            <a href="video.html"     class="nav-link">video</a>
            <a href="dev-tools.html" class="nav-link">dev tools</a>
            <a href="about.html"     class="nav-link">about</a>
        </nav>
    </div>

    <script>
        const NUM_BANDS = 10;
        const MAX_H     = 36;
        const container = document.getElementById('eq-container');
        const levels    = Array.from({ length: NUM_BANDS }, () => Math.random() * MAX_H + 5);
        const targets   = [...levels];
        const bars      = [];

        for (let i = 0; i < NUM_BANDS; i++) {
            const b = document.createElement('div');
            b.className = 'eq-bar';
            b.style.height = levels[i] + 'px';
            container.appendChild(b);
            bars.push(b);
        }

        (function animate() {
            for (let i = 0; i < NUM_BANDS; i++) {
                if (Math.random() < 0.08) targets[i] = Math.random() * MAX_H + 5;
                levels[i] += (targets[i] - levels[i]) * 0.12;
                bars[i].style.height = levels[i].toFixed(1) + 'px';
            }
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dpaul.studio</title>
    <link rel="stylesheet" href="../assets/global.css">

    <style>
        :root {
            --bg:     #131413;
            --bg2:    #1a1c1a;
            --orange: #FF6600;
            --cream:  #D4C4A8;
            --border: rgba(255,102,0,0.22);
            --dim:    rgba(212,196,168,0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: var(--cream);
        }

        /* Grain */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: 0.4;
        }

        /* ── LAYOUT ── */
        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100dvh;
        }

        /* ── TOP NAV BAR ── */
        #topbar {
            flex-shrink: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .topbar-brand {
            font-size: 0.78rem;
            color: var(--orange);
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        /* ── CENTRE STAGE ── */
        #stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle radial glow behind wordmark */
        #stage::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 280px; height: 280px;
            background: radial-gradient(ellipse, rgba(255,102,0,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .wordmark {
            font-size: clamp(2rem, 10vw, 3.2rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
            line-height: 1;
            text-align: center;
            z-index: 2;
            position: relative;
        }

        .wordmark span { color: var(--orange); }

        /* ── EQ ── */
        #eq-wrap {
            margin-top: 20px;
            z-index: 2;
            position: relative;
        }

        #eq {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 48px;
        }

        .bar-col {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .seg {
            width: 100%;
            height: 5px;
            border-radius: 1px;
            background: #1e201e;
            transition: background 0.05s;
        }

        .seg.on      { background: var(--orange); }
        .seg.on.mid  { background: #aacc00; }
        .seg.on.top  { background: #cc3300; }

        /* Tagline */
        .tagline {
            margin-top: 16px;
            font-size: 0.68rem;
            color: rgba(255,102,0,0.55);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            text-align: center;
            z-index: 2;
            position: relative;
        }

        /* ── TAB BAR NAV ── */
        #tabbar {
            flex-shrink: 0;
            padding: 12px 14px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #eq-nav-wrap {
            width: 100%;
            padding: 0 2px 4px;
        }

        #eq-nav {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 36px;
            width: 100%;
        }

        .tab-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .tab-link {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 13px 4px;
            text-decoration: none;
            color: #000;
            background: #F0EDE6;
            border: 8px solid var(--orange);
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            text-transform: lowercase;
            transition: background 0.12s, color 0.12s;
        }

        .tab-link:active {
            background: var(--orange);
            color: #000;
        }

        .tab-link.active {
            background: var(--orange);
            color: #000;
        }
    </style>
</head>
<body>

<div id="app">

    <!-- Top bar -->
    <div id="topbar">
        <div class="topbar-brand">dPaul Technologies</div>
    </div>

    <!-- Centre stage -->
    <div id="stage">
        <div class="wordmark"><span>d</span>paul.studio</div>

        <div id="eq-wrap">
            <div id="eq"></div>
        </div>

        <div class="tagline">// design · music · code · video</div>
    </div>

    <!-- Tab bar navigation -->
    <nav id="tabbar">
        <div id="eq-nav-wrap">
            <div id="eq-nav"></div>
        </div>
        <div class="tab-row">
            <a href="design.html"    class="tab-link">design</a>
            <a href="merch.html"     class="tab-link">merch</a>
            <a href="music.html"     class="tab-link">music</a>
            <a href="synths.html"    class="tab-link">synths</a>
        </div>
        <div class="tab-row">
            <a href="tools.html"     class="tab-link">tools</a>
            <a href="video.html"     class="tab-link">video</a>
            <a href="dev-tools.html" class="tab-link">dev tools</a>
            <a href="about.html"     class="tab-link">about</a>
        </div>
    </nav>

</div>

<script src="nav-loader.js"></script>
<script>
    /* ── EQ ANIMATION ── */
    const NUM_BANDS = 7;
    const NUM_SEGS  = 25;
    const eq        = document.getElementById('eq');
    const levels    = Array.from({ length: NUM_BANDS }, () => Math.random() * NUM_SEGS + 1);
    const targets   = [...levels];
    const cols      = [];

    function buildEQ(el, numBands, numSegs, segsStore) {
        for (let b = 0; b < numBands; b++) {
            const col  = document.createElement('div');
            col.className = 'bar-col';
            const segs = [];
            for (let s = numSegs - 1; s >= 0; s--) {
                const seg = document.createElement('div');
                seg.className = 'seg';
                col.appendChild(seg);
                segs.push(seg);
            }
            el.appendChild(col);
            segsStore.push(segs);
        }
    }

    buildEQ(eq, NUM_BANDS, NUM_SEGS, cols);

    /* Nav EQ — shares same band count, independent levels */
    const eqNav      = document.getElementById('eq-nav');
    const navCols    = [];
    const navLevels  = Array.from({ length: NUM_BANDS }, () => Math.random() * NUM_SEGS + 1);
    const navTargets = [...navLevels];
    buildEQ(eqNav, NUM_BANDS, NUM_SEGS, navCols);

    function renderEQ(lvls, colsArr, numSegs) {
        for (let b = 0; b < lvls.length; b++) {
            const lv = Math.round(lvls[b]);
            colsArr[b].forEach((seg, i) => {
                const segNum = numSegs - i;
                if (segNum <= lv) {
                    seg.classList.add('on');
                    seg.classList.toggle('top', segNum >= numSegs);
                    seg.classList.toggle('mid', segNum === numSegs - 1);
                } else {
                    seg.classList.remove('on', 'mid', 'top');
                }
            });
        }
    }

    function animate() {
        for (let b = 0; b < NUM_BANDS; b++) {
            if (Math.random() < 0.07) targets[b]    = Math.random() * NUM_SEGS + 1;
            if (Math.random() < 0.07) navTargets[b] = Math.random() * NUM_SEGS + 1;
            levels[b]    += (targets[b]    - levels[b])    * 0.15;
            navLevels[b] += (navTargets[b] - navLevels[b]) * 0.15;
            levels[b]    = Math.max(1, Math.min(NUM_SEGS, levels[b]));
            navLevels[b] = Math.max(1, Math.min(NUM_SEGS, navLevels[b]));
        }
        renderEQ(levels,    cols,    NUM_SEGS);
        renderEQ(navLevels, navCols, NUM_SEGS);
        requestAnimationFrame(animate);
    }

    animate();

    /* ── TAB ACTIVE STATE ── */
    const path = location.pathname.split('/').pop();
    document.querySelectorAll('.tab-link').forEach(link => {
        if (link.getAttribute('href') === path) link.classList.add('active');
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <title>dpaul.studio</title>

    <style>
        :root {
            --bg:      #171717;
            --orange:  #e6432a;
            --cream:   #f4f3ef;
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            color: var(--cream);
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: 0.35;
        }

        /* ── TOP LEFT GROUP (EQ + WORDMARK) ── */
        #brand-group {
            position: absolute;
            top: 60px;
            left: 60px;
            z-index: 10;
        }

        #eq-container {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 30px;
            margin-bottom: 15px;
        }

        .eq-bar {
            width: 4px;
            background: var(--orange);
            transition: height 0.1s ease;
        }

        .wordmark {
            font-family: 'Anton', sans-serif;
            font-size: clamp(4rem, 12vw, 10rem);
            font-weight: 400;
            line-height: 0.85;
            color: #FFFFFF;
            letter-spacing: 0;
            text-transform: lowercase;
        }

        .wordmark .accent { color: var(--orange); }

        /* ── LOWER RIGHT NAVIGATION ── */
        #nav-sidebar {
            position: absolute;
            bottom: 40px;
            right: 40px;
            text-align: right;
            z-index: 10;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 0;
        }

        .nav-link {
            text-decoration: none;
            color: rgba(244, 243, 239, 0.25);
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: lowercase;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
            display: block;
            padding: 0 10px;
            line-height: 1.0;
            white-space: nowrap;
        }

        .nav-link:hover, .nav-link:active {
            color: var(--orange);
            transform: translateX(-15px);
        }

        @media (max-width: 768px) {
            #brand-group {
                top: 40px;
                left: 30px;
            }
            .wordmark {
                font-size: clamp(3.2rem, 12vw, 5rem);
            }
            #nav-sidebar {
                bottom: 24px;
                right: 24px;
            }
            .nav-link {
                font-size: 2.2rem;
                line-height: 1.09;
                padding: 2px 8px;
            }
        }
    </style>
</head>
<body>

    <div id="brand-group">
        <div id="eq-container"></div>
        <div class="wordmark">
            <span class="accent">d</span>paul<br>.studio
        </div>
    </div>

    <nav id="nav-sidebar">
        <ul class="nav-list">
            <li class="nav-item"><a href="m-about.html"    class="nav-link">about</a></li>
            <li class="nav-item"><a href="m-current.html"  class="nav-link">current</a></li>
            <li class="nav-item"><a href="m-design.html"   class="nav-link">design</a></li>
            <li class="nav-item"><a href="m-fun.html"      class="nav-link">fun</a></li>
            <li class="nav-item"><a href="m-merch.html"    class="nav-link">merch</a></li>
            <li class="nav-item"><a href="m-music.html"    class="nav-link">music</a></li>
            <li class="nav-item"><a href="m-services.html" class="nav-link">services</a></li>
            <li class="nav-item"><a href="m-software.html" class="nav-link">software</a></li>
            <li class="nav-item"><a href="m-synths.html"   class="nav-link">synths</a></li>
            <li class="nav-item"><a href="m-tools.html"    class="nav-link">tools</a></li>
            <li class="nav-item"><a href="m-video.html"    class="nav-link">video</a></li>
        </ul>
    </nav>

    <script>
        const NUM_BANDS = 10;
        const MAX_H     = 30;
        const container = document.getElementById('eq-container');
        const levels    = Array.from({ length: NUM_BANDS }, () => Math.random() * MAX_H + 5);
        const targets   = [...levels];
        const bars      = [];

        for (let i = 0; i < NUM_BANDS; i++) {
            const b = document.createElement('div');
            b.className = 'eq-bar';
            b.style.height = levels[i] + 'px';
            container.appendChild(b);
            bars.push(b);
        }

        (function animate() {
            for (let i = 0; i < NUM_BANDS; i++) {
                if (Math.random() < 0.08) targets[i] = Math.random() * MAX_H + 5;
                levels[i] += (targets[i] - levels[i]) * 0.12;
                bars[i].style.height = levels[i].toFixed(1) + 'px';
            }
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>

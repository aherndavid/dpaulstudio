<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch En Route — dPaul Technologies</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* OPTION A: Typewriter look */
            font-family: "Courier New", Courier, monospace; 
        }

        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            object-position: center;
            z-index: -1;
        }

        .content-overlay {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.4); /* Darkened slightly for better readability */
            padding: 20px;
        }

        h1 {
            /* OPTION B: Signature look (uncomment font-family to use) */
            /* font-family: 'Dancing Script', cursive; */
            font-size: clamp(2.5rem, 8vw, 4rem); /* Adjusts size based on screen */
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        p {
            font-size: 1.1rem;
            max-width: 500px;
            line-height: 1.6;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <img id="bg-image" src="../assets/merch-trolley.png" alt="Merch En Route — dPaul Technologies">

    <div class="content-overlay">
        <h1>Merch En Route</h1>
        <p>The dpaul.studio exclusive merch collection. Limited-run pieces designed with the studio's signature aesthetic — once they're gone, they're gone.</p>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON PHOENIX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            color: #00FF41;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            overflow: hidden;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── GAME WRAPPER ── */
        #game-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100dvh;
        }

        /* ── CANVAS AREA ── */
        #canvas-area {
            position: relative;
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        /* CRT scanline overlay */
        #canvas-area::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 3;
        }

        /* ── TOUCH CONTROLS ── */
        #controls {
            flex-shrink: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            background: #000;
            border-top: 1px solid rgba(0,255,65,0.2);
            gap: 12px;
            z-index: 20;
        }

        /* D-pad left/right cluster */
        .dpad {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .ctrl-btn {
            width: 72px;
            height: 72px;
            border-radius: 8px;
            border: 2px solid rgba(0,255,65,0.5);
            background: rgba(0,255,65,0.06);
            color: #00FF41;
            font-family: 'Press Start 2P', cursive;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 0 10px rgba(0,255,65,0.15), inset 0 0 8px rgba(0,255,65,0.05);
            transition: background 0.08s, box-shadow 0.08s;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn:active, .ctrl-btn.pressed {
            background: rgba(0,255,65,0.2);
            box-shadow: 0 0 18px rgba(0,255,65,0.5), inset 0 0 10px rgba(0,255,65,0.1);
            border-color: #00FF41;
        }

        .fire-btn {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: 3px solid rgba(57,255,20,0.6);
            background: rgba(57,255,20,0.07);
            color: #39FF14;
            font-size: 11px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 16px rgba(57,255,20,0.25), inset 0 0 12px rgba(57,255,20,0.06);
            font-family: 'Press Start 2P', cursive;
        }

        .fire-btn:active, .fire-btn.pressed {
            background: rgba(57,255,20,0.25);
            box-shadow: 0 0 28px rgba(57,255,20,0.7), inset 0 0 14px rgba(57,255,20,0.15);
            border-color: #39FF14;
        }

        /* ── UI OVERLAYS ── */
        .ui-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.92);
            text-align: center;
            z-index: 10;
            padding: 20px;
            gap: 0;
        }

        .ui-overlay h1 {
            font-size: clamp(18px, 5vw, 28px);
            text-shadow: 0 0 12px #00FF41, 0 0 30px #00FF41;
            margin-bottom: 16px;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%,100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.6; }
            94% { opacity: 1; }
            96% { opacity: 0.7; }
            97% { opacity: 1; }
        }

        .ui-overlay p {
            font-size: clamp(7px, 2vw, 11px);
            line-height: 2;
            color: #00CC33;
            margin-bottom: 8px;
        }

        .tap-hint {
            font-size: clamp(8px, 2.2vw, 12px);
            color: #39FF14;
            border: 1px solid rgba(0,255,65,0.4);
            padding: 10px 18px;
            margin-top: 16px;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { opacity: 1; box-shadow: 0 0 6px rgba(0,255,65,0.3); }
            50% { opacity: 0.5; box-shadow: 0 0 14px rgba(0,255,65,0.6); }
        }

        .back-link {
            margin-top: 20px;
            color: #00FF41;
            text-decoration: none;
            font-size: clamp(7px, 1.8vw, 10px);
            border: 1px solid rgba(0,255,65,0.4);
            padding: 8px 14px;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .back-link:hover { background: rgba(0,255,65,0.15); }

        .credit-text {
            font-size: clamp(6px, 1.5vw, 9px);
            margin-top: 20px;
            color: #39FF14;
            opacity: 0.6;
            line-height: 1.8;
        }

        input {
            background: #000;
            border: 1px solid #00FF41;
            color: #00FF41;
            font-family: 'Press Start 2P', cursive;
            padding: 10px;
            text-align: center;
            margin-top: 14px;
            font-size: clamp(12px, 3vw, 18px);
            width: 120px;
            outline: none;
            letter-spacing: 4px;
        }

        .score-display {
            font-size: clamp(8px, 2vw, 11px);
            margin-bottom: 12px;
            color: #39FF14;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-wrapper">

    <!-- CANVAS -->
    <div id="canvas-area">
        <canvas id="gameCanvas"></canvas>

        <!-- START SCREEN -->
        <div id="start-screen" class="ui-overlay">
            <h1>NEON<br>PHOENIX</h1>
            <p style="margin-top:8px;">DESTROY ALL ENEMIES<br>AVOID RETURN FIRE</p>
            <div class="tap-hint">TAP FIRE TO START</div>
            <a href="m/dev-tools.html" class="back-link">← DEV TOOLS</a>
            <div class="credit-text">MUSIC BY<br>LOGAN AHERN</div>
        </div>

        <!-- GAME OVER -->
        <div id="game-over-screen" class="ui-overlay hidden">
            <h1 style="font-size:clamp(14px,4vw,22px); margin-bottom:12px;">GAME OVER</h1>
            <div class="score-display" id="final-score"></div>
            <p>ENTER INITIALS:</p>
            <input type="text" id="player-name" maxlength="3" value="AAA" autocomplete="off" autocorrect="off" spellcheck="false">
            <p style="font-size:clamp(6px,1.5vw,9px); margin-top:10px; opacity:0.7;">TAP FIRE TO PLAY AGAIN</p>
            <a href="m/dev-tools.html" class="back-link">← DEV TOOLS</a>
            <div class="credit-text">MUSIC BY LOGAN AHERN</div>
        </div>
    </div>

    <!-- TOUCH CONTROLS -->
    <div id="controls">
        <div class="dpad">
            <div class="ctrl-btn" id="btn-left">◀</div>
            <div class="ctrl-btn" id="btn-right">▶</div>
        </div>
        <div class="ctrl-btn fire-btn" id="btn-fire">FIRE</div>
    </div>

</div>

<script>
/** ── AUDIO ── **/
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const bgMusic = new Audio();
bgMusic.crossOrigin = "anonymous";
bgMusic.src = 'https://files.catbox.moe/yt0gcw.mp3';
bgMusic.loop = true;
bgMusic.volume = 0.5;

function playSound(freq, type, duration, vol = 0.1) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

const sounds = {
    shoot:     () => playSound(600, 'square', 0.1),
    explosion: () => playSound(100, 'sawtooth', 0.3, 0.2),
    hit:       () => playSound(1200, 'sine', 0.05),
    start:     () => { playSound(440, 'square', 0.1); setTimeout(() => playSound(880, 'square', 0.2), 100); }
};

/** ── CANVAS SETUP ── **/
const canvas       = document.getElementById('gameCanvas');
const ctx          = canvas.getContext('2d');
const canvasArea   = document.getElementById('canvas-area');
const startScreen  = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const nameInput    = document.getElementById('player-name');

// Internal resolution
const CW = 360, CH = 640;
canvas.width  = CW;
canvas.height = CH;

// Scale canvas to fill available space while keeping aspect ratio
function resizeCanvas() {
    const areaW = canvasArea.clientWidth;
    const areaH = canvasArea.clientHeight;
    const scale = Math.min(areaW / CW, areaH / CH);
    canvas.style.width  = (CW * scale) + 'px';
    canvas.style.height = (CH * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

/** ── GAME STATE ── **/
let score, lives, gameRunning, enemies, bullets, player, shootCooldown;

function resetState() {
    score         = 0;
    lives         = 3;
    gameRunning   = false;
    enemies       = [];
    bullets       = [];
    shootCooldown = 0;
    player = { x: CW / 2, y: CH - 60, w: 30, h: 20, speed: 5 };
}
resetState();

/** ── INPUT ── **/
const keys = { left: false, right: false, fire: false };

// Keyboard
window.addEventListener('keydown', e => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (e.code === 'ArrowLeft')  keys.left  = true;
    if (e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'Space') {
        e.preventDefault();
        keys.fire = true;
        if (!gameRunning) handleStart();
    }
    if (e.code === 'Enter' && !gameOverScreen.classList.contains('hidden')) handleStart();
});
window.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft')  keys.left  = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'Space')      keys.fire  = false;
});

// Touch buttons — support multi-touch
function bindBtn(id, key) {
    const el = document.getElementById(id);
    ['touchstart','mousedown'].forEach(ev => {
        el.addEventListener(ev, e => {
            e.preventDefault();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            keys[key] = true;
            el.classList.add('pressed');
            if (key === 'fire' && !gameRunning) handleStart();
        }, { passive: false });
    });
    ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev => {
        el.addEventListener(ev, e => {
            e.preventDefault();
            keys[key] = false;
            el.classList.remove('pressed');
        }, { passive: false });
    });
}
bindBtn('btn-left',  'left');
bindBtn('btn-right', 'right');
bindBtn('btn-fire',  'fire');

function handleStart() {
    if (!gameRunning && !gameOverScreen.classList.contains('hidden')) {
        // game over — restart
        resetState();
        gameOverScreen.classList.add('hidden');
        startGame();
    } else if (!gameRunning) {
        startGame();
    }
}

/** ── GAME LOOP ── **/
function startGame() {
    resetState();
    gameRunning = true;
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    sounds.start();
    bgMusic.play().catch(() => {});
    spawnWave();
    requestAnimationFrame(animate);
}

function spawnWave() {
    for (let i = 0; i < 5; i++) {
        for (let j = 0; j < 4; j++) {
            enemies.push({
                x: 50 + i * 62,
                y: 55 + j * 48,
                radius: 12,
                phase: Math.random() * Math.PI * 2,
                type: j === 0 ? 'bird' : 'grunt'
            });
        }
    }
}

function update() {
    if (!gameRunning) return;

    // Move player
    if (keys.left  && player.x > 25)       player.x -= player.speed;
    if (keys.right && player.x < CW - 25)  player.x += player.speed;

    // Shoot with cooldown (prevents bullet spam on touch hold)
    if (shootCooldown > 0) shootCooldown--;
    if (keys.fire && shootCooldown === 0) {
        if (bullets.filter(b => b.fromPlayer).length < 3) {
            bullets.push({ x: player.x, y: player.y - 10, speed: -9, fromPlayer: true });
            sounds.shoot();
            shootCooldown = 12;
        }
    }

    // Move bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y += bullets[i].speed;
        if (bullets[i].y < 0 || bullets[i].y > CH) bullets.splice(i, 1);
    }

    // Update enemies
    const now = Date.now();
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const e = enemies[ei];
        e.x += Math.sin(now * 0.002 + e.phase) * 1.8;
        e.y += 0.28;

        // Enemy shoots
        if (Math.random() < 0.006) {
            bullets.push({ x: e.x, y: e.y + 10, speed: 5, fromPlayer: false });
        }

        // Enemy reaches bottom
        if (e.y > CH - 40) { endGame(); return; }

        // Check player bullets vs enemy
        for (let bi = bullets.length - 1; bi >= 0; bi--) {
            const b = bullets[bi];
            if (!b.fromPlayer) continue;
            const hitW = e.type === 'bird' ? 18 : e.radius + 2;
            const hitH = e.type === 'bird' ? 15 : e.radius + 2;
            if (b.x > e.x - hitW && b.x < e.x + hitW && b.y > e.y - hitH && b.y < e.y + hitH) {
                enemies.splice(ei, 1);
                bullets.splice(bi, 1);
                score += 100;
                sounds.explosion();
                if (enemies.length === 0) spawnWave();
                break;
            }
        }
    }

    // Enemy bullets hit player
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
        const b = bullets[bi];
        if (b.fromPlayer) continue;
        if (b.x > player.x - 15 && b.x < player.x + 15 && b.y > player.y - 10 && b.y < player.y + 15) {
            bullets.splice(bi, 1);
            lives--;
            sounds.hit();
            if (lives <= 0) { endGame(); return; }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, CW, CH);
    ctx.shadowBlur = 0;

    // HUD
    ctx.fillStyle = '#00FF41';
    ctx.font = '10px "Press Start 2P"';
    ctx.fillText(`SC: ${score}`, 12, 30);
    ctx.fillText(`LV: ${'♥'.repeat(lives)}`, CW - 12 - ctx.measureText(`LV: ${'♥'.repeat(lives)}`).width, 30);

    // Divider line
    ctx.strokeStyle = 'rgba(0,255,65,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, 40); ctx.lineTo(CW, 40); ctx.stroke();

    // Player
    ctx.strokeStyle = '#39FF14';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#39FF14';
    ctx.beginPath();
    ctx.moveTo(player.x, player.y - 15);
    ctx.lineTo(player.x - 15, player.y + 10);
    ctx.lineTo(player.x - 5, player.y + 5);
    ctx.lineTo(player.x + 5, player.y + 5);
    ctx.lineTo(player.x + 15, player.y + 10);
    ctx.closePath();
    ctx.stroke();

    // Enemies
    enemies.forEach(e => {
        if (e.type === 'bird') {
            ctx.strokeStyle = '#00FF41';
            ctx.lineWidth = 1.5;
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#00FF41';
            const wingM = Math.sin(Date.now() * 0.01) * 12;
            ctx.beginPath();
            ctx.moveTo(e.x, e.y);
            ctx.lineTo(e.x - 18, e.y - 5 + wingM);
            ctx.lineTo(e.x, e.y + 12);
            ctx.lineTo(e.x + 18, e.y - 5 + wingM);
            ctx.closePath();
            ctx.stroke();
        } else {
            ctx.strokeStyle = '#39FF14';
            ctx.lineWidth = 1;
            ctx.shadowBlur = 14;
            ctx.shadowColor = '#00FF41';
            ctx.beginPath();
            for (let i = 0; i < 16; i++) {
                const angle = (i / 16) * Math.PI * 2;
                const r = e.radius * (0.8 + Math.random() * 0.4);
                ctx.moveTo(e.x + Math.cos(angle) * e.radius * 0.4, e.y + Math.sin(angle) * e.radius * 0.4);
                ctx.lineTo(e.x + Math.cos(angle) * r, e.y + Math.sin(angle) * r);
            }
            ctx.stroke();
        }
    });

    // Bullets
    ctx.lineWidth = 2;
    bullets.forEach(b => {
        ctx.strokeStyle = b.fromPlayer ? '#39FF14' : '#FF3B5C';
        ctx.shadowBlur = 6;
        ctx.shadowColor = b.fromPlayer ? '#39FF14' : '#FF3B5C';
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(b.x, b.y + (b.fromPlayer ? -12 : 12));
        ctx.stroke();
    });
}

function endGame() {
    gameRunning = false;
    bgMusic.pause();
    bgMusic.currentTime = 0;
    document.getElementById('final-score').innerText = 'SCORE: ' + score;
    gameOverScreen.classList.remove('hidden');
    nameInput.focus();
}

function animate() {
    if (!gameRunning) return;
    update();
    draw();
    requestAnimationFrame(animate);
}

// Initial frame
draw();
</script>
</body>
</html>

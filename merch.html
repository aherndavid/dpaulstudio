<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch — dPaul Technologies</title>
    <style>
        :root {
            --bg:     #000;
            --orange: #FF6600;
            --cream:  #D4C4A8;
            --text:   #a8a89e;
            --dim:    #444440;
            --border: rgba(255,102,0,0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* grain */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: 0.5;
        }

        /* ── NAV ── */
        nav {
            position: sticky; top: 0; z-index: 200;
            background: #000;
            border-bottom: 1px solid var(--border);
            padding: 0 48px; display: flex; align-items: center; gap: 4px; height: 68px;
        }
        nav a {
            font-size: 1rem; color: var(--cream); text-decoration: none;
            padding: 8px 16px; border: 1px solid transparent; border-radius: 3px;
            letter-spacing: 0.05em; transition: all 0.15s; text-transform: lowercase;
        }
        nav a:hover  { border-color: var(--orange); color: var(--orange); }
        nav a.active { background: var(--orange); color: #000; font-weight: bold; border-color: var(--orange); }
        nav .spacer  { flex: 1; }

        /* ── TOP BLACK SPACE ── */
        .top-bar {
            background: #000;
            padding: 60px 48px 48px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }
        .top-label {
            font-size: 0.68rem;
            letter-spacing: 0.3em;
            color: var(--orange);
            text-transform: uppercase;
        }
        .top-right {
            font-size: 0.68rem;
            letter-spacing: 0.25em;
            color: var(--dim);
            text-transform: uppercase;
            text-align: right;
        }

        /* ── FULL WIDTH IMAGE ── */
        .merch-image {
            width: 100%;
            display: block;
            line-height: 0;
            background: #000;
        }
        .merch-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ── BOTTOM BLACK SPACE ── */
        .bottom-bar {
            background: #000;
            padding: 56px 48px 80px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 48px;
        }

        .bottom-left {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .pulse-badge {
            display: inline-block;
            padding: 8px 18px;
            border: 1px solid var(--orange);
            color: var(--orange);
            font-size: 0.68rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            animation: pulse 2.8s ease-in-out infinite;
            width: fit-content;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .bottom-copy {
            font-size: 0.82rem;
            line-height: 1.85;
            color: var(--dim);
            max-width: 420px;
            letter-spacing: 0.03em;
        }

        .bottom-right {
            text-align: right;
            flex-shrink: 0;
        }
        .bottom-sig {
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            color: var(--dim);
            text-transform: uppercase;
            line-height: 2;
        }
        .bottom-sig span { color: var(--orange); }

        /* ── FOOTER LINE ── */
        .footer-line {
            background: #000;
            padding: 24px 48px;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: #2a2a28;
            text-transform: uppercase;
            border-top: 1px solid rgba(255,102,0,0.08);
        }

        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            nav a { padding: 8px 10px; font-size: 0.85rem; }
            .top-bar  { padding: 40px 20px 32px; flex-direction: column; gap: 8px; }
            .bottom-bar { padding: 40px 20px 60px; flex-direction: column; gap: 32px; }
            .bottom-right { text-align: left; }
            .footer-line { padding: 20px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="design.html">design</a>
    <a href="merch.html" class="active">merch</a>
    <a href="music.html">music</a>
    <a href="synths.html">synths</a>
    <a href="tools.html">tools</a>
    <a href="video.html">video</a>
    <a href="dev-tools.html">dev tools</a>
    <div class="spacer"></div>
    <a href="about.html">info</a>
</nav>

<div class="top-bar">
    <div class="top-label">// dPaul Technologies — Merch</div>
    <div class="top-right">Limited run<br>Debut collection</div>
</div>

<div class="merch-image">
    <img src="assets/merch-en-route.png" alt="Merch En Route — dPaul Technologies">
</div>

<div class="bottom-bar">
    <div class="bottom-left">
        <div class="pulse-badge">// En Route</div>
        <div class="bottom-copy">
            The debut collection is on its way.<br>
            Once it drops — it drops.
        </div>
    </div>
    <div class="bottom-right">
        <div class="bottom-sig">
            dPaul Technologies<br>
            <span>dpaul.studio</span>
        </div>
    </div>
</div>

<div class="footer-line">// dPaul Technologies — Limited run — once gone, gone</div>

</body>
</html>

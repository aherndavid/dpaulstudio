<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dPaul TTS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            overflow: hidden; /* Prevents bouncing/scrolling on mobile */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #131413;
            /* svh ensures it fits even when browser toolbars are visible */
            height: 100svh; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .outer-wrap {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px; /* Limits width on tablets/desktops */
            height: 100%;
            max-height: 700px; /* Keeps the UI tight and "app-like" */
            gap: 10px;
        }

        .container {
            width: 100%;
            background: linear-gradient(145deg, #4a0a0a, #6a1010);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        h1 {
            color: #000;
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 10px;
            font-family: Impact, sans-serif;
            text-align: center;
        }

        .main-layout { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            flex: 1; 
            min-height: 0; /* Important for nested flex scrolling */
        }

        .display-section { 
            display: flex; 
            flex-direction: column; 
            flex: 1.5; /* Gives more room to the text area */
        }

        .section {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 8px;
            border: 1px solid #000;
        }

        .section.grow { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }

        label, .section-title {
            color: #888;
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            flex: 1;
            padding: 10px;
            background: #001a00;
            border: 1px solid #000;
            border-radius: 4px;
            color: #00dd00;
            font-size: 14px; /* 14px+ prevents auto-zoom on iPhone input focus */
            font-family: 'Courier New', monospace;
            resize: none;
        }

        /* Controls Grid for Mobile */
        .controls-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .full-width { grid-column: span 2; }

        .inc-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .inc-btn {
            width: 30px;
            height: 30px;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        .inc-value {
            flex: 1;
            text-align: center;
            color: #00dd00;
            font-family: monospace;
            background: #000;
            font-size: 12px;
        }

        .button-group { 
            display: flex; 
            gap: 5px; 
            margin-top: 8px;
        }

        button {
            padding: 12px;
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            flex: 1;
        }

        .btn-primary { background: #444; color: #fff; }
        .btn-export { background: #1a3a1a; color: #00cc00; }

        .status {
            margin-top: 8px;
            padding: 5px;
            background: #000;
            color: #00aa00;
            font-size: 10px;
            text-align: center;
            font-family: monospace;
        }

        select {
            width: 100%;
            padding: 5px;
            background: #000;
            color: #fff;
            border: 1px solid #333;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="outer-wrap">
    <div class="container">
        <h1>dPaul TTS <span style="font-size:10px; opacity:0.6;">v2.10</span></h1>

        <div class="main-layout">
            <div class="display-section">
                <div class="section grow">
                    <label>SCRIPT DISPLAY</label>
                    <textarea id="textInput" placeholder="Enter text..."></textarea>
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="speakBtn">SPEAK</button>
                    <button id="clearBtn">CLEAR</button>
                    <button id="stopBtn" disabled>STOP</button>
                </div>
                <div class="status" id="status">Ready</div>
            </div>

            <div class="controls-layout">
                <div class="section full-width">
                    <div class="section-title">VOICE</div>
                    <select id="voiceSelect"><option>Loading...</option></select>
                </div>

                <div class="section">
                    <div class="section-title">SPEED</div>
                    <div class="inc-row">
                        <button class="inc-btn" id="rateDown">−</button>
                        <div class="inc-value" id="rateDisplay">1.0×</div>
                        <button class="inc-btn" id="rateUp">+</button>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">PITCH</div>
                    <div class="inc-row">
                        <button class="inc-btn" id="pitchDown">−</button>
                        <div class="inc-value" id="pitchDisplay">1.0</div>
                        <button class="inc-btn" id="pitchUp">+</button>
                    </div>
                </div>

                <div class="section full-width">
                    <button class="btn-export" id="exportBtn" style="width:100%">⬇ Export WAV</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Paste the JavaScript logic from the previous response here.
// I have kept IDs like 'speakBtn', 'rateDown', etc. identical so the logic works.
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dPaul TTS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background: #131413; color: #fff; font-family: -apple-system, sans-serif; 
        }

        body { 
            display: flex; flex-direction: column; 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
        }

        .container {
            width: 100%; max-width: 420px; margin: auto;
            background: linear-gradient(145deg, #4a0a0a, #6a1010);
            border-radius: 14px; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            max-height: 92vh;
        }

        h1 { font-family: Impact, sans-serif; font-size: 26px; color: #000; text-align: center; }
        
        .section { background: #0a0a0a; border-radius: 8px; padding: 10px; border: 1px solid #000; }
        label { color: #888; font-size: 12px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }

        textarea {
            width: 100%; flex: 1; min-height: 100px;
            background: #001a00; color: #00dd00; border: 1px solid #000;
            padding: 12px; font-family: 'Courier New', monospace;
            font-size: 19px; resize: none; border-radius: 5px;
        }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .full { grid-column: span 2; }

        .inc-row { display: flex; align-items: center; gap: 8px; }
        .inc-btn { width: 44px; height: 44px; background: #333; color: #fff; border: none; border-radius: 5px; font-size: 24px; font-weight: bold; }
        .inc-value { flex: 1; text-align: center; color: #00dd00; font-family: monospace; font-weight: bold; font-size: 19px; }

        select { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #333; border-radius: 5px; font-size: 16px; }

        .btn-group { display: flex; gap: 8px; margin-top: 5px; }
        button.action { flex: 1; padding: 16px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        button.primary { background: #555; border-color: #777; }

        #status { background: #000; color: #00aa00; font-family: monospace; font-size: 13px; padding: 8px; text-align: center; border-radius: 5px; }
    </style>
</head>
<body onclick="initVoices()" ontouchstart="initVoices()">

<div class="container">
    <h1>dPaul TTS</h1>

    <div class="section" style="display:flex; flex-direction:column; flex:1;">
        <label>Input</label>
        <textarea id="textInput" placeholder="TAP ANYWHERE TO LOAD..."></textarea>
        <div class="btn-group">
            <button class="action primary" onclick="speak()">SPEAK</button>
            <button class="action" onclick="document.getElementById('textInput').value=''">CLEAR</button>
        </div>
    </div>

    <div class="controls-grid">
        <div class="section full">
            <label>English Voices</label>
            <select id="voiceSelect"><option>Click to load voices...</option></select>
        </div>

        <div class="section">
            <label>Speed</label>
            <div class="inc-row">
                <button class="inc-btn" onclick="adjust('rate', -0.1)">-</button>
                <div class="inc-value" id="rateVal">1.0</div>
                <button class="inc-btn" onclick="adjust('rate', 0.1)">+</button>
            </div>
        </div>

        <div class="section">
            <label>Pitch</label>
            <div class="inc-row">
                <button class="inc-btn" onclick="adjust('pitch', -0.1)">-</button>
                <div class="inc-value" id="pitchVal">1.0</div>
                <button class="inc-btn" onclick="adjust('pitch', 0.1)">+</button>
            </div>
        </div>
    </div>

    <div id="status">System Locked: TAP SCREEN</div>
</div>

<script>
    const synth = window.speechSynthesis;
    let voices = [];
    let params = { rate: 1.0, pitch: 1.0 };
    let initialized = false;

    // Aggressive load for Mobile
    function initVoices() {
        if (initialized) return;
        
        // Hack: Speak a "silent" character to wake up the OS engine
        const wake = new SpeechSynthesisUtterance(" ");
        wake.volume = 0;
        synth.speak(wake);
        
        refreshVoices();
        initialized = true;
    }

    function refreshVoices() {
        voices = synth.getVoices().filter(v => v.lang.includes('en'));
        const select = document.getElementById('voiceSelect');
        
        if (voices.length > 0) {
            select.innerHTML = '';
            voices.forEach((v, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = v.name.replace('Google ', '').replace('Apple ', '');
                select.appendChild(opt);
            });
            document.getElementById('status').textContent = "READY: " + voices.length + " VOICES";
        }
    }

    // Standard event listeners
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

    // Safety Poller
    setInterval(() => { if (voices.length === 0) refreshVoices(); }, 1000);

    function adjust(type, amt) {
        params[type] = Math.max(0.1, Math.min(2.0, params[type] + amt));
        document.getElementById(type + 'Val').textContent = params[type].toFixed(1);
    }

    function speak() {
        const text = document.getElementById('textInput').value;
        if (!text || voices.length === 0) return;

        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.voice = voices[document.getElementById('voiceSelect').value];
        utter.rate = params.rate;
        utter.pitch = params.pitch;
        
        utter.onstart = () => document.getElementById('status').textContent = "SPEAKING...";
        utter.onend = () => document.getElementById('status').textContent = "READY";
        
        synth.speak(utter);
    }
</script>
</body>
</html>

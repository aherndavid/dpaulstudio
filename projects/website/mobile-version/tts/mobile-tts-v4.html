<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dPaul TTS</title>
    <script src="https://unpkg.com/sam-js@0.3.1/dist/sam.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; background: #131413; color: #fff; font-family: -apple-system, sans-serif; }
        body { height: 100svh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; font-size: 19px; }

        .container {
            width: 100%; max-width: 420px;
            background: linear-gradient(145deg, #4a0a0a, #6a1010);
            border-radius: 14px; padding: 18px;
            display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-family: Impact, sans-serif; font-size: 28px; color: #000; text-align: center; margin-bottom: 5px; }
        
        .section { background: #0a0a0a; border-radius: 8px; padding: 12px; border: 1px solid #000; }
        label { color: #888; font-size: 13px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 7px; }

        textarea {
            width: 100%; height: 110px; background: #001a00; color: #00dd00;
            border: 1px solid #000; padding: 12px; font-family: 'Courier New', monospace;
            font-size: 19px; resize: none; border-radius: 5px;
        }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full { grid-column: span 2; }

        .inc-row { display: flex; align-items: center; gap: 10px; }
        .inc-btn { width: 44px; height: 44px; background: #333; color: #fff; border: none; border-radius: 5px; font-size: 26px; font-weight: bold; cursor: pointer; }
        .inc-value { flex: 1; text-align: center; color: #00dd00; font-family: monospace; font-weight: bold; font-size: 19px; }

        select { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #333; border-radius: 5px; font-size: 16px; }

        .reverb-box { display: flex; align-items: center; justify-content: space-between; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00dd00; }
        input:checked + .slider:before { transform: translateX(24px); }

        .btn-group { display: flex; gap: 10px; margin-top: 5px; }
        button.action { flex: 1; padding: 16px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; font-weight: bold; font-size: 14px; text-transform: uppercase; cursor: pointer; }
        button.primary { background: #555; border-color: #777; }
        button.export { background: #1a3a1a; color: #00cc00; border-color: #005500; width: 100%; }

        #status { background: #000; color: #00aa00; font-family: monospace; font-size: 13px; padding: 8px; text-align: center; border-radius: 5px; }
    </style>
</head>
<body onclick="forceLoad()">

<div class="container">
    <h1>dPaul TTS <span style="font-size: 13px; opacity: 0.5;">v3.2</span></h1>

    <div class="section">
        <label>Text Input</label>
        <textarea id="textInput" placeholder="TAP TO START..."></textarea>
        <div class="btn-group">
            <button class="action primary" onclick="handleSpeak()">SPEAK</button>
            <button class="action" onclick="document.getElementById('textInput').value=''">CLEAR</button>
        </div>
    </div>

    <div class="controls-grid">
        <div class="section full">
            <label>Voice Selection</label>
            <select id="voiceSelect" onmousedown="forceLoad()"><option value="retro">RETRO: Speak & Spell</option></select>
        </div>

        <div class="section">
            <label>Speed</label>
            <div class="inc-row">
                <button class="inc-btn" onclick="adjust('rate', -0.1)">-</button>
                <div class="inc-value" id="rateVal">1.0</div>
                <button class="inc-btn" onclick="adjust('rate', 0.1)">+</button>
            </div>
        </div>

        <div class="section">
            <label>Pitch</label>
            <div class="inc-row">
                <button class="inc-btn" onclick="adjust('pitch', -0.1)">-</button>
                <div class="inc-value" id="pitchVal">1.0</div>
                <button class="inc-btn" onclick="adjust('pitch', 0.1)">+</button>
            </div>
        </div>

        <div class="section full reverb-box">
            <label style="margin:0">Space Reverb</label>
            <label class="switch">
                <input type="checkbox" id="reverbToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <button class="action export" onclick="handleExport()">⬇ DOWNLOAD WAV</button>
    <div id="status">Tap anywhere to load voices</div>
</div>

<script>
    const sam = new SamJs();
    const synth = window.speechSynthesis;
    let voices = [];
    let params = { rate: 1.0, pitch: 1.0 };
    let loaded = false;

    function forceLoad() {
        if (loaded && voices.length > 0) return;
        loadVoices();
    }

    function loadVoices() {
        const rawVoices = synth.getVoices();
        if (rawVoices.length === 0) {
            // Chrome/Android fallback: trigger a tiny silent speech to "wake" the engine
            const wake = new SpeechSynthesisUtterance("");
            synth.speak(wake);
            return;
        }

        const voiceSelect = document.getElementById('voiceSelect');
        voices = rawVoices.filter(v => v.lang.toLowerCase().includes('en'));
        
        // Keep Retro at top
        voiceSelect.innerHTML = '<option value="retro">RETRO: Speak & Spell</option>';
        
        voices.forEach((voice, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `${voice.name} (${voice.lang})`;
            voiceSelect.appendChild(opt);
        });

        document.getElementById('status').textContent = "Ready (" + voices.length + " Voices)";
        loaded = true;
    }

    // Modern Browsers
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
    
    // Automatic Retry
    const retry = setInterval(() => {
        if (voices.length === 0) loadVoices();
        else clearInterval(retry);
    }, 1000);

    function adjust(type, amt) {
        params[type] = Math.max(0.1, Math.min(2.0, params[type] + amt));
        document.getElementById(type + 'Val').textContent = params[type].toFixed(1);
    }

    async function handleSpeak() {
        const text = document.getElementById('textInput').value;
        const voiceIdx = document.getElementById('voiceSelect').value;
        if (!text) return;

        synth.cancel();
        
        if (voiceIdx === 'retro') {
            document.getElementById('status').textContent = "Synth... (SAM)";
            const samConfig = { 
                speed: Math.round(params.rate * 72), 
                pitch: Math.round(params.pitch * 64) 
            };
            const buf = await sam.buf(text, samConfig);
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createBufferSource();
            const audioBuffer = audioCtx.createBuffer(1, buf.length, 22050);
            audioBuffer.getChannelData(0).set(Array.from(buf).map(v => (v - 128) / 128));
            source.buffer = audioBuffer;

            if (document.getElementById('reverbToggle').checked) {
                const conv = audioCtx.createConvolver();
                const rate = audioCtx.sampleRate;
                const impulse = audioCtx.createBuffer(2, rate*2, rate);
                for(let i=0; i<2; i++) {
                    let ch = impulse.getChannelData(i);
                    for(let j=0; j<rate*2; j++) ch[j] = (Math.random()*2-1) * Math.pow(1-j/(rate*2), 1.5);
                }
                conv.buffer = impulse;
                source.connect(conv);
                conv.connect(audioCtx.destination);
            } else {
                source.connect(audioCtx.destination);
            }
            source.start();
        } else {
            document.getElementById('status').textContent = "Speaking...";
            const utter = new SpeechSynthesisUtterance(text);
            utter.voice = voices[voiceIdx];
            utter.rate = params.rate;
            utter.pitch = params.pitch;
            utter.onend = () => document.getElementById('status').textContent = "Ready";
            synth.speak(utter);
        }
    }

    function handleExport() {
        const text = document.getElementById('textInput').value;
        if (!text) return;
        const samConfig = { speed: Math.round(params.rate * 72), pitch: Math.round(params.pitch * 64) };
        sam.download(text, samConfig);
    }

    loadVoices();
</script>
</body>
</html>

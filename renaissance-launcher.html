<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --text-color: #ffffff;
      --bg-color: #131413;
      --accent-color: #333;
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: grid;
      grid-template-columns: 2fr 1fr 1.5fr; /* Matches the 3-section layout */
      gap: 40px;
      width: 90%;
      max-width: 1000px;
      align-items: center;
    }

    /* Column 1: Album Cover */
    .album-cover {
      aspect-ratio: 1 / 1;
      background: #222;
      border: 2px solid var(--accent-color);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Column 2: CD Selection */
    .cd-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .cd-box {
      border: 2px solid var(--text-color);
      padding: 20px;
      text-align: center;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .cd-box:hover {
      background: var(--text-color);
      color: var(--bg-color);
    }

    /* Column 3: Player Controls */
    .player-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .track-name {
      font-size: 1.2rem;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--accent-color);
      padding-bottom: 10px;
      width: 100%;
      text-align: center;
    }

    .timestamp {
      font-size: 3rem;
      font-family: monospace;
    }

    .controls {
      display: flex;
      gap: 30px;
      font-size: 2rem;
      user-select: none;
    }

    .control-btn {
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .control-btn:hover {
      opacity: 0.7;
    }

  </style>
</head>
<body>

  <div class="container">
    
    <div class="album-cover">
      <span>ALBUM COVER</span>
    </div>

    <div class="cd-list">
      <div class="cd-box">CD1</div>
      <div class="cd-box">CD2</div>
      <div class="cd-box">CD3</div>
    </div>

    <div class="player-info">
      <div class="track-name">SONG | TRACK</div>
      <div class="timestamp">00:00</div>
      <div class="controls">
        <span class="control-btn">&lt;&lt;</span>
        <span class="control-btn">||</span>
        <span class="control-btn">&gt;&gt;</span>
      </div>
    </div>

  </div>

</body>
</html>

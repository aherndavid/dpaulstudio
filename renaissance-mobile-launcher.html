<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renaissance Mobile Launcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #131413;
      overflow: hidden;
    }

    /* THIS IS THE LARGE BACKGROUND IMAGE */
    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(19, 20, 19, 0.7), rgba(19, 20, 19, 0.7)), 
        url('https://raw.githubusercontent.com/aherndavid/dpaulstudio/main/assets/renaissance-cd-cover.jpg'); 
      background-size: cover;
      background-position: center;
      z-index: 1; /* Behind the iframe */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: transparent;
      position: relative;
      z-index: 2; /* On top of the background */
    }
  </style>
</head>
<body>

  <div class="bg-overlay"></div>

  <iframe 
    src="renaissance-mobile.html" 
    scrolling="no" 
    allow="autoplay"
    allowtransparency="true">
  </iframe>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENAISSANCE: LIVE FEED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            background-color: #050505;
            color: #33ff33;
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* CRT Effects */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .crt-container {
            width: 85%;
            max-width: 700px;
            text-shadow: 0 0 8px #33ff33;
            border: 1px solid #33ff33;
            padding: 30px;
            background: rgba(0, 20, 0, 0.1);
        }

        #header-info { margin-bottom: 20px; border-bottom: 1px dashed #33ff33; padding-bottom: 10px; }
        #now-playing { font-size: 1.8rem; height: 180px; }
        #timer { font-size: 2.5rem; color: #fff; text-shadow: 0 0 10px #fff; }

        .label { color: #88ff88; }
        .cursor {
            display: inline-block;
            background-color: #33ff33;
            width: 10px;
            height: 1.5rem;
            animation: blink 0.7s infinite;
        }

        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        @keyframes flicker { 0% { opacity: 0.98; } 5% { opacity: 0.95; } 100% { opacity: 1; } }
        body { animation: flicker 0.15s infinite; }
    </style>
</head>
<body>

<div class="crt-container">
    <div id="header-info">
        > RENAISSANCE_1994_STREAM<br>
        > STATUS: <span style="color:red">● LIVE</span><br>
        > SESSION TIME: <span id="timer">00:00</span>
    </div>

    <div id="now-playing">
        <span class="label">[ SYSTEM INITIALIZING ]</span><br>
        PLEASE WAIT...
    </div>
    
    <div style="margin-top: 20px; font-size: 1rem; opacity: 0.6;">
        > SYNCING TO MASTER CLOCK...
    </div>
</div>

<script>
// Tracklist with start times calculated cumulatively in seconds
const playlist = [
    { time: 0, artist: "LEFTFIELD", track: "SONG OF LIFE (LEMON INTERUPT MIX)" },
    { time: 326, artist: "LEFTFIELD", track: "SONG OF LIFE (DUB FOR LIFE MIX)" },
    { time: 568, artist: "LEFTFIELD", track: "SONG OF LIFE (STEPPIN' RAZOR MIX)" },
    { time: 704, artist: "BEDROCK feat. CAROL LEEMING", track: "FOR WHAT YOU DREAM OF (FULL ON RENAISSANCE MIX)" },
    { time: 1083, artist: "RHYTHM INVENTION", track: "CHRONOCLASM" },
    { time: 1240, artist: "DISCO EVANGELISTS", track: "DE NIRO (THE SPACEFLIGHT REMIX)" },
    { time: 1606, artist: "MEMPHISTO", track: "STATE OF MIND (QUIET MIX)" },
    { time: 1709, artist: "MOONCHILD", track: "V.O.A.T (ORIGINAL MIX)" },
    { time: 2037, artist: "SUNSCREEM", track: "PERFECT MOTION (SIMPLE DUB MIX)" },
    { time: 2125, artist: "SUNSCREEM", track: "PERFECT MOTION (BOYS OWN MIX)" },
    { time: 2646, artist: "RIVER OCEAN", track: "LOVE & HAPPINESS (JUNIOR BOYS OWN SUPER DUB)" }
];

let totalSeconds = 0;
const timerElement = document.getElementById('timer');
const displayElement = document.getElementById('now-playing');

function updateDisplay() {
    // Find the current track based on time
    let current = playlist[0];
    for (let i = 0; i < playlist.length; i++) {
        if (totalSeconds >= playlist[i].time) {
            current = playlist[i];
        }
    }

    displayElement.innerHTML = `
        <span class="label">NOW PLAYING:</span><br>
        ARTIST: ${current.artist}<br>
        TRACK:  ${current.track}<br>
        <span class="label">----------------------------</span><br>
        SOURCE: RENAISSANCE (BLUE MIX)<br>
        BITRATE: 1411 KBPS
    `;
}

function startClock() {
    setInterval(() => {
        totalSeconds++;
        
        // Format time for the CRT header
        let mins = Math.floor(totalSeconds / 60);
        let secs = totalSeconds % 60;
        timerElement.innerText = 
            (mins < 10 ? "0" + mins : mins) + ":" + 
            (secs < 10 ? "0" + secs : secs);
        
        updateDisplay();
    }, 1000);
}

// Start sequence
setTimeout(() => {
    startClock();
    updateDisplay();
}, 2000); // 2 second delay to simulate boot-up
</script>

</body>
</html>

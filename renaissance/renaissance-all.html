<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENAISSANCE: TRILOGY FEED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --crt-color: #33ccff; 
            --glow: rgba(51, 204, 255, 0.4);
        }

        body {
            background-color: #131413;
            color: var(--crt-color);
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow: hidden;
        }

        /* CRT Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #131413;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .crt-container {
            width: 95%;
            height: 90vh;
            margin-top: 2vh;
            border: 2px solid var(--crt-color);
            padding: 20px;
            box-sizing: border-box;
            background: rgba(19, 20, 19, 0.5); 
            box-shadow: inset 0 0 15px var(--glow), 0 0 10px rgba(0, 0, 0, 0.5);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #disc-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--crt-color);
            padding-bottom: 10px;
        }

        .disc-btn {
            background: transparent;
            border: 1px solid var(--crt-color);
            color: #fff;
            font-family: 'VT323', monospace;
            cursor: pointer;
            padding: 2px 10px;
            font-size: 1.1rem;
        }

        .disc-btn:hover { background: var(--crt-color); color: #000; }
        .active-disc { background: var(--crt-color); color: #000; box-shadow: 0 0 10px var(--crt-color); }

        #timer { font-size: 4rem; color: #fff; text-align: center; text-shadow: 0 0 10px var(--crt-color); }

        #now-playing { flex-grow: 1; font-size: 1.8rem; line-height: 1.1; display: flex; flex-direction: column; justify-content: center; }

        .label { color: var(--crt-color); text-transform: uppercase; font-size: 1rem; opacity: 0.7; }
        .data { color: #fff; margin-bottom: 10px; display: block; }

        .footer {
            border-top: 1px dashed var(--crt-color);
            padding-top: 10px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="boot-screen" onclick="bootSystem()">
    <h1 style="color: #33ccff; font-size: 3rem; text-shadow: 0 0 10px #33ccff;">RENAISSANCE_1994</h1>
    <p style="color: #fff; animation: blink 1s infinite;">[ CLICK TO INITIALIZE DAT_FEED ]</p>
</div>

<audio id="crt-audio" preload="auto" crossorigin="anonymous"></audio>

<div class="crt-container">
    <div id="disc-selector">
        <button class="disc-btn" onclick="changeDisc('blue')">DISC_01: BLUE</button>
        <button class="disc-btn" onclick="changeDisc('orange')">DISC_02: ORANGE</button>
        <button class="disc-btn" onclick="changeDisc('green')">DISC_03: GREEN</button>
    </div>

    <div id="header">
        SYS_ID: RENAISSANCE_1994 // <span id="mix-id">STANDBY</span><br>
        FEED: <span id="status-led" style="color:gray;">● OFFLINE</span>
        <span id="timer">00:00</span>
    </div>

    <div id="now-playing">
        <span class="data" style="text-align:center;">SYSTEM_READY...<br>AWAITING DISC SELECTION</span>
    </div>

    <div class="footer">
        <div>DECODE: 16-BIT / 44.1kHz<br>SOURCE: CATBOX_DIRECT_STREAM</div>
        <div style="text-align:right;">SIGNAL: <span id="sig-strength">--</span><br>BPM: SYNCED</div>
    </div>
</div>

<script>
const audio = document.getElementById('crt-audio');
const timerEl = document.getElementById('timer');
const displayEl = document.getElementById('now-playing');
const statusLed = document.getElementById('status-led');
const sigEl = document.getElementById('sig-strength');

const data = {
    blue: {
        color: '#33ccff',
        label: '01 // BLUE_MIX',
        file: 'https://files.catbox.moe/azs98z.mp3',
        tracks: [
            { time: 0, art: "LEFTFIELD", trk: "SONG OF LIFE\n(LEMON INTERRUPT MIX)" },
            { time: 326, art: "LEFTFIELD", trk: "SONG OF LIFE\n(DUB FOR LIFE MIX)" },
            { time: 568, art: "LEFTFIELD", trk: "SONG OF LIFE\n(STEPPIN' RAZOR MIX)" },
            { time: 704, art: "BEDROCK FEATURING KYO", trk: "FOR WHAT YOU DREAM OF\n(FULL ON RENAISSANCE MIX)" },
            { time: 1083, art: "RHYTHM INVENTION", trk: "CHRONOCLASM" },
            { time: 1240, art: "DISCO EVANGELISTS", trk: "DE NIRO\n(SPACEFLIGHT REMIX)" },
            { time: 1606, art: "MEMPHISTO", trk: "STATE OF MIND\n(QUIET MIX)" },
            { time: 1709, art: "MOONCHILD", trk: "V.O.A.T\n(ORIGINAL MIX)" },
            { time: 2037, art: "SUNSCREEM", trk: "PERFECT MOTION\n(HELLER & FARLEY MIX)" },
            { time: 2646, art: "RIVER OCEAN", trk: "LOVE & HAPPINESS\n(X-PRESS 2 DUB)" },
            { time: 2913, art: "THAT KID CHRIS", trk: "KEEP ON PRESSIN' ON" },
            { time: 3261, art: "REMAKE / INNER CITY", trk: "BLADERUNNER / 'TIL WE MEET AGAIN" },
            { time: 3525, art: "BUMP", trk: "HOUSE STOMPIN'\n(BIG BUMP MIX)" },
            { time: 3947, art: "F MACHINE", trk: "CHILD BRIDE\n(FEEDBACK MAX MIX)" },
            { time: 4215, art: "M PEOPLE", trk: "RENAISSANCE\n(JOHN DIGWEED MIX)" }
        ]
    }
};

function bootSystem() {
    audio.play().then(() => { audio.pause(); }).catch(e => console.log("Engaged"));
    document.getElementById('boot-screen').style.display = 'none';
}

function changeDisc(disc) {
    if(!data[disc] || !data[disc].file) return;
    const mix = data[disc];
    
    document.documentElement.style.setProperty('--crt-color', mix.color);
    document.documentElement.style.setProperty('--glow', mix.color + '66');
    document.getElementById('mix-id').innerText = mix.label;
    
    statusLed.style.color = 'red';
    statusLed.style.animation = 'blink 1s infinite';
    statusLed.innerText = '● LIVE_STREAM';

    audio.src = mix.file;
    audio.play();

    document.querySelectorAll('.disc-btn').forEach(btn => {
        btn.classList.remove('active-disc');
        if(btn.innerText.includes(disc.toUpperCase())) btn.classList.add('active-disc');
    });
}

audio.ontimeupdate = () => {
    const currentTime = audio.currentTime;
    let mins = Math.floor(currentTime / 60);
    let secs = Math.floor(currentTime % 60);
    timerEl.innerText = (mins < 10 ? "0"+mins : mins) + ":" + (secs < 10 ? "0"+secs : secs);
    
    // Signal Strength Animation
    let bars = "|||".substring(0, Math.floor(Math.random() * 3) + 1);
    sigEl.innerText = bars + " " + Math.floor(Math.random() * 20 + 80) + "%";

    const playlist = data.blue.tracks;
    let currentTrack = playlist[0];
    for (let i = 0; i < playlist.length; i++) {
        if (currentTime >= playlist[i].time) currentTrack = playlist[i];
    }

    displayEl.innerHTML = `
        <span class="label">CURRENT_ARTIST:</span>
        <span class="data">${currentTrack.art}</span>
        <span class="label">CURRENT_TRACK:</span>
        <span class="data">${currentTrack.trk}</span>
    `;
};

audio.onwaiting = () => {
    displayEl.innerHTML = '<span class="data" style="color:yellow; animation:blink 0.5s infinite;">BUFFERING_STREAM...</span>';
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENAISSANCE: TRILOGY FEED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --crt-color: #33ccff; 
            --glow: rgba(51, 204, 255, 0.4);
        }

        body {
            background-color: #131413;
            color: var(--crt-color);
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            transition: color 0.5s ease;
        }

        /* CRT Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .crt-container {
            width: 95%;
            height: 90vh;
            margin-top: 2vh;
            border: 2px solid var(--crt-color);
            padding: 20px;
            box-sizing: border-box;
            background: rgba(19, 20, 19, 0.5); 
            box-shadow: inset 0 0 15px var(--glow), 0 0 10px rgba(0, 0, 0, 0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }

        #disc-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--crt-color);
            padding-bottom: 10px;
        }

        .disc-btn {
            background: transparent;
            border: 1px solid var(--crt-color);
            color: #fff;
            font-family: 'VT323', monospace;
            cursor: pointer;
            padding: 2px 10px;
            font-size: 1.1rem;
        }

        .disc-btn:hover { background: var(--crt-color); color: #000; }
        .active-disc { background: var(--crt-color); color: #000; box-shadow: 0 0 10px var(--crt-color); }

        #header {
            border-bottom: 2px solid var(--crt-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        #timer {
            font-size: 4rem;
            color: #fff;
            display: block;
            text-align: center;
            margin: 5px 0;
            text-shadow: 0 0 10px var(--crt-color);
        }

        #now-playing {
            flex-grow: 1;
            font-size: 1.8rem;
            line-height: 1.1;
            white-space: pre-wrap;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .label { color: var(--crt-color); text-transform: uppercase; font-size: 1rem; opacity: 0.7; }
        .data { color: #fff; margin-bottom: 10px; display: block; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        .footer {
            border-top: 1px dashed var(--crt-color);
            padding-top: 10px;
            font-size: 0.9rem;
            opacity: 0.8;
            display: flex;
            justify-content: space-between;
        }

        @keyframes flicker { 0% { opacity: 0.98; } 10% { opacity: 0.95; } 100% { opacity: 1; } }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        body { animation: flicker 0.15s infinite; }
    </style>
</head>
<body>

<audio id="crt-audio" preload="auto" crossorigin="anonymous"></audio>

<div class="crt-container">
    <div id="disc-selector">
        <button class="disc-btn" onclick="changeDisc('blue')">DISC_01: BLUE</button>
        <button class="disc-btn" onclick="changeDisc('orange')">DISC_02: ORANGE</button>
        <button class="disc-btn" onclick="changeDisc('green')">DISC_03: GREEN</button>
    </div>

    <div id="header">
        SYS_ID: RENAISSANCE_1994 // <span id="mix-id">STANDBY</span><br>
        FEED: <span id="status-led" style="color:gray;">● OFFLINE</span>
        <span id="timer">00:00</span>
    </div>

    <div id="now-playing">
        <span class="data" style="text-align:center;">INITIALIZING...<br>SELECT DISC TO BOOT SYSTEM</span>
    </div>

    <div class="footer">
        <div>DECODE: 16-BIT / 44.1kHz<br>SOURCE: REMOTE_DRIVE_STREAM</div>
        <div style="text-align:right;">BPM_TRACKER: ACTIVE<br>MEM_LOAD: 14.1%</div>
    </div>
</div>

<script>
const audio = document.getElementById('crt-audio');
const timerEl = document.getElementById('timer');
const displayEl = document.getElementById('now-playing');
const statusLed = document.getElementById('status-led');

const data = {
    blue: {
        color: '#33ccff',
        label: '01 // BLUE_MIX',
        file: 'https://docs.google.com/uc?export=download&id=1bdeVUHDnS92CtdWQdmiWveXt-WCM7Dx4',
        tracks: [
            { time: 0, art: "LEFTFIELD", trk: "SONG OF LIFE\n(LEMON INTERRUPT MIX)" },
            { time: 326, art: "LEFTFIELD", trk: "SONG OF LIFE\n(DUB FOR LIFE MIX)" },
            { time: 568, art: "LEFTFIELD", trk: "SONG OF LIFE\n(STEPPIN' RAZOR MIX)" },
            { time: 704, art: "BEDROCK FEATURING KYO", trk: "FOR WHAT YOU DREAM OF\n(FULL ON RENAISSANCE MIX)" },
            { time: 1083, art: "RHYTHM INVENTION", trk: "CHRONOCLASM" },
            { time: 1240, art: "DISCO EVANGELISTS", trk: "DE NIRO\n(SPACEFLIGHT REMIX)" },
            { time: 1606, art: "MEMPHISTO", trk: "STATE OF MIND\n(QUIET MIX)" },
            { time: 1709, art: "MOONCHILD", trk: "V.O.A.T\n(ORIGINAL MIX)" },
            { time: 2037, art: "SUNSCREEM", trk: "PERFECT MOTION\n(HELLER & FARLEY MIX)" },
            { time: 2646, art: "RIVER OCEAN", trk: "LOVE & HAPPINESS\n(X-PRESS 2 DUB)" },
            { time: 2913, art: "THAT KID CHRIS", trk: "KEEP ON PRESSIN' ON" },
            { time: 3261, art: "REMAKE / INNER CITY", trk: "BLADERUNNER / 'TIL WE MEET AGAIN" },
            { time: 3525, art: "BUMP", trk: "HOUSE STOMPIN'\n(BIG BUMP MIX)" },
            { time: 3947, art: "F MACHINE", trk: "CHILD BRIDE\n(FEEDBACK MAX MIX)" },
            { time: 4215, art: "M PEOPLE", trk: "RENAISSANCE\n(JOHN DIGWEED MIX)" }
        ]
    },
    orange: {
        color: '#ff8800',
        label: '02 // ORANGE_MIX',
        file: '', // Add ID here later
        tracks: [{ time: 0, art: "SYSTEM_OFFLINE", trk: "NO_DATA_FOUND" }]
    },
    green: {
        color: '#33ff33',
        label: '03 // GREEN_MIX',
        file: '', // Add ID here later
        tracks: [{ time: 0, art: "SYSTEM_OFFLINE", trk: "NO_DATA_FOUND" }]
    }
};

let currentDisc = null;

function changeDisc(disc) {
    currentDisc = disc;
    const mix = data[disc];
    
    // UI Theme Transition
    document.documentElement.style.setProperty('--crt-color', mix.color);
    document.documentElement.style.setProperty('--glow', mix.color + '66');
    document.getElementById('mix-id').innerText = mix.label;
    
    // Status Update
    statusLed.style.color = 'red';
    statusLed.style.animation = 'blink 1s infinite';
    statusLed.innerText = '● LIVE_STREAM';

    // Audio Setup
    if(mix.file) {
        audio.src = mix.file;
        audio.play().catch(e => {
            displayEl.innerHTML = '<span class="data" style="color:red">ERROR: USER INTERACTION REQUIRED</span>';
        });
    }

    // Active Button Style
    document.querySelectorAll('.disc-btn').forEach(btn => {
        btn.classList.remove('active-disc');
        if(btn.innerText.includes(disc.toUpperCase())) btn.classList.add('active-disc');
    });
}

function updateTimerDisplay(seconds) {
    let mins = Math.floor(seconds / 60);
    let secs = Math.floor(seconds % 60);
    timerEl.innerText = (mins < 10 ? "0"+mins : mins) + ":" + (secs < 10 ? "0"+secs : secs);
}

audio.ontimeupdate = () => {
    if (!currentDisc) return;
    const currentTime = audio.currentTime;
    updateTimerDisplay(currentTime);
    
    const playlist = data[currentDisc].tracks;
    let currentTrack = playlist[0];
    for (let i = 0; i < playlist.length; i++) {
        if (currentTime >= playlist[i].time) {
            currentTrack = playlist[i];
        }
    }

    displayEl.innerHTML = `
        <span class="label">CURRENT_ARTIST:</span>
        <span class="data">${currentTrack.art}</span>
        <span class="label">CURRENT_TRACK:</span>
        <span class="data">${currentTrack.trk}</span>
        <span class="label">BITRATE:</span>
        <span class="data">1411KBPS (PCM_STREAM)</span>
    `;
};

audio.onwaiting = () => {
    displayEl.innerHTML = '<span class="data" style="color:yellow; animation:blink 0.5s infinite;">BUFFERING_STREAM...</span>';
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENAISSANCE: TRILOGY FEED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --crt-color: #33ccff;
            --glow: rgba(51, 204, 255, 0.4);
            --bg-color: #131413;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--crt-color);
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 12px;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .crt-container {
            width: 100%;
            max-width: 480px;
            border: 2px solid var(--crt-color);
            background: rgba(19, 20, 19, 0.8);
            box-shadow: inset 0 0 15px var(--glow), 0 0 10px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 14px;
        }

        .art-panel {
            width: 100%;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--crt-color);
            padding-bottom: 14px;
        }

        #cover-art {
            width: 60%;
            max-width: 220px;
            border: 1px solid var(--crt-color);
            opacity: 0.85;
            box-shadow: 0 0 20px var(--glow);
            filter: brightness(1.05) contrast(1.05);
            animation: flicker 4s infinite;
        }

        @keyframes flicker {
            0%   { opacity: 0.85; }
            92%  { opacity: 0.85; }
            93%  { opacity: 0.6; }
            94%  { opacity: 0.85; }
            97%  { opacity: 0.75; }
            100% { opacity: 0.85; }
        }

        #disc-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .disc-btn {
            background: transparent;
            border: 2px solid var(--crt-color);
            color: var(--crt-color);
            font-family: 'VT323', monospace;
            cursor: pointer;
            font-size: 1.4rem;
            padding: 6px 14px;
            letter-spacing: 1px;
            transition: all 0.2s;
            box-shadow: 0 0 6px var(--glow);
            line-height: 1.1;
            flex: 1;
        }

        .disc-btn:hover, .active-disc {
            background: var(--crt-color);
            color: #00

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL: RENAISSANCE_1994</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            background-color: #050505;
            color: #33ff33;
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* CRT Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .crt-container {
            width: 90%;
            max-width: 850px;
            position: relative;
            z-index: 5;
            text-shadow: 0 0 5px #33ff33;
        }

        #terminal {
            white-space: pre-wrap;
            font-size: 1.5rem;
            line-height: 1.3;
            letter-spacing: 1px;
        }

        .cursor {
            display: inline-block;
            background-color: #33ff33;
            width: 10px;
            height: 1.2rem;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Subtle screen flicker */
        @keyframes flicker {
            0% { opacity: 0.98; }
            5% { opacity: 0.95; }
            10% { opacity: 0.99; }
            100% { opacity: 1; }
        }
        body { animation: flicker 0.15s infinite; }

    </style>
</head>
<body>

<div class="crt-container">
    <div id="terminal"></div><span class="cursor"></span>
</div>

<script>
const text = `> ACCESSING ARCHIVE...
> LOADING FILE: RENAISSANCE_1994.LOG
> RUNNING CRT_EMULATION_MODE...
> 
RENAISSANCE: THE MIX COLLECTION (SASHA & JOHN DIGWEED)

WIDELY REGARDED AS THE "HOLY GRAIL" OF DJ MIX COMPILATIONS, RENAISSANCE: THE MIX COLLECTION IS THE 1994 DEBUT MASTERPIECE FROM BRITISH ICONS SASHA & JOHN DIGWEED. 

IT REDEFINED THE ELECTRONIC MUSIC INDUSTRY BY PROVING THAT A DJ MIX COULD BE A HIGH-ART, COMMERCIAL POWERHOUSE.

[THE DEFINITIVE SOUND OF AN ERA]
RELEASED ON 14 OCTOBER 1994, THIS TRIPLE-CD SET SERVED AS A SONIC BLUEPRINT FOR THE LEGENDARY RENAISSANCE NIGHTCLUB. IT WEAVES TOGETHER HOUSE, PROGRESSIVE HOUSE, AND EARLY TRANCE.

ARTISTIC PRESENTATION: MICHELANGELO’S PAINTING OF THE PROPHET ZECHARIAH (SISTINE CHAPEL) SIGNALED THE ALBUM'S AMBITIOUS, "HIGH-CULTURE" INTENT.

[TRACK LISTING DETECTED]

DISC ONE: THE BLUE MIX
01. LEFTFIELD - SONG OF LIFE
02. BEDROCK FEAT. KYO - FOR WHAT YOU DREAM OF
03. RHYTHM INVENTION - CHRONOCLASM
04. THE DISCO EVANGELISTS - DE NIRO
05. M PEOPLE - RENAISSANCE

DISC TWO: THE ORANGE MIX
01. FLUKE - SLID (PDF MIX)
02. HYSTERIX - TALK TO ME
03. GRACE - NOT OVER YET
04. V.F.R. - TRANCEILLUSION

DISC THREE: THE GREEN MIX
01. MOBY - GO (NIGHTTIME MIX)
02. SPOOKY - LITTLE BULLET
03. AGE OF LOVE - THE AGE OF LOVE (JAM & SPOON MIX)
04. LEMON INTERRUPT - DIRTY

> END OF FILE.
> SYSTEM STANDBY...`;

let i = 0;
const speed = 30; // Milliseconds per character
const terminal = document.getElementById('terminal');

function typeWriter() {
    if (i < text.length) {
        terminal.innerHTML += text.charAt(i);
        i++;
        // Randomize speed slightly for a "mechanical" feel
        setTimeout(typeWriter, speed + Math.random() * 20);
        
        // Auto-scroll to bottom as it types
        window.scrollTo(0, document.body.scrollHeight);
    }
}

// Start typing on load
window.onload = typeWriter;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL: RENAISSANCE_FIRST_TRACK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            background-color: #050505;
            color: #33ff33;
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* CRT Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .crt-container {
            width: 90%;
            max-width: 850px;
            position: relative;
            z-index: 5;
            text-shadow: 0 0 5px #33ff33;
        }

        #terminal {
            white-space: pre-wrap;
            font-size: 1.5rem;
            line-height: 1.3;
            letter-spacing: 1px;
        }

        .cursor {
            display: inline-block;
            background-color: #33ff33;
            width: 10px;
            height: 1.2rem;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            5% { opacity: 0.95; }
            10% { opacity: 0.99; }
            100% { opacity: 1; }
        }
        body { animation: flicker 0.15s infinite; }
    </style>
</head>
<body>

<div class="crt-container">
    <div id="terminal"></div><span class="cursor"></span>
</div>

<script>
const text = `> ACCESSING ARCHIVE...
> ACCESSING ARCHIVE...
> FOUND:
> PLEASE WAIT:
> PLEASE WAIT:
> FOUND:

> LOADING FILE: RENAISSANCE_1994.LOG
> RUNNING CRT_EMULATION_MODE...

RENAISSANCE: THE MIX COLLECTION (SASHA & JOHN DIGWEED)

[TRACK LISTING DETECTED]

DISC ONE: THE BLUE MIX
01. LEFTFIELD - SONG OF LIFE (LEMON INTERRUPT MIX)

> END OF FILE.
> SYSTEM STANDBY...`;

let i = 0;
const speed = 30; 
const terminal = document.getElementById('terminal');

function typeWriter() {
    if (i < text.length) {
        let char = text.charAt(i);
        terminal.innerHTML += char;
        i++;

        let lastLines = text.substring(0, i);
        // Triggers the 5 second pause after the second PLEASE WAIT:
        if (lastLines.endsWith("PLEASE WAIT:")) {
            setTimeout(typeWriter, 5000); 
        } else {
            setTimeout(typeWriter, speed + Math.random() * 20);
        }
        
        window.scrollTo(0, document.body.scrollHeight);
    }
}

window.onload = typeWriter;
</script>

</body>
</html>

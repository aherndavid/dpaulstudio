<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dpaul studio</title>

    <script>
        (function() {
            // Check screen width or mobile user agent signatures
            if (window.innerWidth <= 800 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                // Redirect to the mobile home page in the subfolder
                window.location.href = 'm/index.html'; 
            }
        })();
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #131413;
            min-height: 100vh;
            display: flex;
            align-items: center;    /* Vertical center */
            justify-content: center; /* Horizontal center */
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            padding: 20px; 
        }

        /* Grain overlay */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: 0.4;
        }

        /* ── OUTER WRAPPER ── */
        .site-wrap {
            width: min(1600px, 96vw);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0;
            transform: translateY(-10vh);
        }

        /* ── EQ SECTION ── */
        .eq-wrap {
            background: #131413;
            padding: 10px;
            display: block;
            border-radius: 6px 6px 0 0;
        }

        .eq-canvas {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: clamp(200px, 35vw, 500px); 
            width: 100%;
        }

        .bar-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            flex: 1;
        }

        .seg {
            width: 100%;
            height: 10px;
            border-radius: 1px;
            background: #1a1a1a;
            transition: none;
        }

        .seg.on     { background: #FF6600; }
        .seg.on.mid { background: #aacc00; }
        .seg.on.top { background: #cc2200; }

        /* ── WORDMARK PANEL ── */
        .wordmark-panel {
            width: 100%;
            background: #131413;
            border: 3px solid #FF6600;
            border-radius: 3px;
            padding: clamp(16px, 2.5vw, 36px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .wordmark {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            font-size: clamp(3.2rem, 10vw, 9rem);
            letter-spacing: 0;
            color: #ffffff;
            line-height: 1;
            text-align: center;
            user-select: none;
        }

        /* Avatar */
        .avatar {
            position: absolute;
            right: clamp(16px, 4vw, 60px);
            bottom: 0;
            height: clamp(180px, 34vw, 450px);
            display: flex;
            align-items: flex-end;
            pointer-events: none;
            z-index: 10;
        }

        .avatar img {
            height: 100%;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(-4px 0 20px rgba(0,0,0,0.85));
        }

        /* ── NAV BAR ── */
        .nav-bar {
            width: 100%;
            background: #131413;
            border: 3px solid #FF6600;
            border-top: none;
            border-radius: 0 0 3px 3px;
            padding: clamp(8px, 1vw, 14px);
            display: flex;
            align-items: center;
            gap: clamp(4px, 0.5vw, 7px);
        }

        .nav-bar a {
            font-weight: 700;
            font-size: clamp(12px, 1.3vw, 18px);
            color: #FF6600;
            text-decoration: none;
            padding: clamp(6px, 0.7vw, 10px) 0;
            border: 3px solid #FF6600;
            border-radius: 3px;
            text-transform: lowercase;
            transition: all 0.15s;
            white-space: nowrap;
            line-height: 1;
            flex: 1;
            text-align: center;
        }

        .nav-bar a:hover {
            background: #FF6600;
            color: #131413;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .avatar { display: none; }
            .nav-bar { flex-wrap: wrap; }
            .nav-bar a { flex: 1 1 30%; font-size: 14px; }
            .eq-canvas { height: 250px; }
        }
    </style>
</head>
<body>

<div class="site-wrap">
    <div class="eq-wrap">
        <div id="eq" class="eq-canvas"></div>
    </div>

    <div class="wordmark-panel">
        <div class="wordmark">dpaul.studio</div>
        <div class="avatar">
            <img src="../assets/man-standing.png" alt="dPaul">
        </div>
    </div>

    <nav class="nav-bar">
        <a href="design.html">design</a>
        <a href="merch.html">merch</a>
        <a href="music.html">music</a>
        <a href="synths.html">synths</a>
        <a href="tools.html">tools</a>
        <a href="video.html">video</a>
        <a href="dev-tools.html">dev tools</a>
        <a href="about.html">about</a>
    </nav>
</div>

<script>
  const NUM_BANDS = 28;
  const NUM_SEGS  = 15;
  const eq        = document.getElementById('eq');
  const levels    = Array.from({length: NUM_BANDS}, () => Math.floor(Math.random() * NUM_SEGS) + 1);
  const targets   = [...levels];
  const cols      = [];

  for (let b = 0; b < NUM_BANDS; b++) {
    const col = document.createElement('div');
    col.className = 'bar-col';
    const segs = [];
    for (let s = NUM_SEGS - 1; s >= 0; s--) {
      const seg = document.createElement('div');
      seg.className = 'seg';
      col.appendChild(seg);
      segs.push(seg);
    }
    eq.appendChild(col);
    cols.push(segs);
  }

  function renderLevels() {
    for (let b = 0; b < NUM_BANDS; b++) {
      const lv = Math.round(levels[b]);
      cols[b].forEach((seg, i) => {
        const segNum = NUM_SEGS - i;
        if (segNum <= lv) {
          seg.classList.add('on');
          if (segNum >= NUM_SEGS)          seg.classList.add('top');
          else if (segNum >= NUM_SEGS - 3) seg.classList.add('mid');
          else { seg.classList.remove('mid'); seg.classList.remove('top'); }
        } else {
          seg.classList.remove('on', 'mid', 'top');
        }
      });
    }
  }

  function animate() {
    for (let b = 0; b < NUM_BANDS; b++) {
      if (Math.random() < 0.05) {
        targets[b] = Math.floor(Math.random() * NUM_SEGS) + 1;
      }
      const diff = targets[b] - levels[b];
      levels[b] += diff * 0.12 + (Math.random() - 0.5) * 0.4;
      levels[b] = Math.max(0.5, Math.min(NUM_SEGS, levels[b]));
    }
    renderLevels();
    requestAnimationFrame(animate);
  }

  renderLevels();
  animate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DPAUL TOOLS // DUPE REMOVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Lexus-inspired soft palette */
            --bg-main:    #F2F2F0;
            --soft-white: #ffffff;
            --soft-shadow: #d1d1cf;
            --text:       #1a1a1a;
            --muted:      #8e8e93;
            --danger:     #D0021B;
            --success:    #1A7A4A;
            --radius:     24px;
            
            /* Neumorphic 'Pillow' Shadows */
            --pillow-raised: 8px 8px 16px var(--soft-shadow), -8px -8px 16px var(--soft-white);
            --pillow-inset:  inset 6px 6px 12px var(--soft-shadow), inset -6px -6px 12px var(--soft-white);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* ── Topbar ── */
        .topbar {
            height: 70px;
            background: var(--bg-main);
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 100;
        }
        .topbar h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .topbar-spacer { flex: 1; }
        
        /* ── Shell ── */
        .shell { display: flex; height: calc(100vh - 70px); padding: 0 20px 20px 20px; gap: 20px; }

        /* ── Sidebar ── */
        .sidebar {
            width: 300px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            padding: 10px;
        }

        .module {
            background: var(--bg-main);
            border-radius: var(--radius);
            box-shadow: var(--pillow-raised);
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .module-label {
            font-size: 10px;
            font-weight: 800;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
            display: block;
        }

        .drop-zone {
            background: var(--bg-main);
            box-shadow: var(--pillow-inset);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: none;
            color: var(--muted);
            font-size: 12px;
            transition: 0.2s;
        }

        /* ── Buttons ── */
        button {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 13px;
            padding: 14px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: var(--bg-main);
            box-shadow: var(--pillow-raised);
            color: var(--text);
            width: 100%;
        }
        button:active { box-shadow: var(--pillow-inset); transform: scale(0.98); }
        button:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; border: 1px solid var(--soft-shadow); }

        .btn-accent { background: #1a1a1a; color: white; }
        .btn-danger { color: var(--danger); }

        /* ── Main Panel (Right Side) ── */
        .main {
            flex: 1;
            background: var(--bg-main);
            border-radius: 32px;
            box-shadow: var(--pillow-inset);
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            width: 100%;
        }

        /* ── Welcome Hero / Large Image ── */
        .welcome-hero {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .welcome-logo {
            max-width: 800px; /* Large scale for the right panel */
            width: 85%;
            height: auto;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.08));
            transition: opacity 0.5s ease;
        }

        /* ── Image Cards ── */
        .card {
            background: var(--bg-main);
            border-radius: var(--radius);
            padding: 12px;
            box-shadow: var(--pillow-raised);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 16px;
            display: block;
            margin-bottom: 12px;
        }
        .card.state-delete { box-shadow: inset 0 0 0 3px var(--danger), var(--pillow-raised); }

        .card-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: var(--bg-main);
            box-shadow: var(--pillow-inset);
            border-radius: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px; width: 24px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            margin-top: -8px;
        }
    </style>
</head>
<body>

<div class="topbar">
    <h1>DPAUL // DUPE REMOVE</h1>
    <div class="topbar-spacer"></div>
    <div id="topbar-stats" style="display:none; font-family:'JetBrains Mono'; font-size:11px; gap:20px;">
        <span>REGISTRY <b id="ts-total">0</b></span>
        <span style="color:var(--danger)">PURGE <b id="ts-delete">0</b></span>
    </div>
</div>

<div class="shell">
    <div class="sidebar">
        <div class="module">
            <span class="module-label">Intake</span>
            <div class="drop-zone" id="drop-zone">
                SELECT OR DROP IMAGES
            </div>
        </div>

        <div class="module">
            <span class="module-label">Sensitivity</span>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:12px; font-weight:600;">
                <span>MATCH LEVEL</span>
                <span id="thresh-val">10</span>
            </div>
            <input type="range" id="threshold" min="1" max="20" value="10" 
                   oninput="document.getElementById('thresh-val').textContent=this.value">
        </div>

        <div class="module">
            <button class="btn-accent" id="btn-scan" onclick="scan()" disabled>RUN ANALYSIS</button>
        </div>

        <div class="module" style="margin-top: auto;">
            <span class="module-label">Terminate</span>
            <button class="btn-danger" id="btn-delete" onclick="deleteMarked()" disabled>PURGE SESSION</button>
        </div>
    </div>

    <div class="main" id="main">
        <div class="welcome-hero">
<img src="https://dpaul.studio/assets/dupe-remove.png" alt="DUPE REMOVE" class="welcome-logo">        </div>
    </div>
</div>

<input type="file" id="file-input" multiple accept="image/*" style="display:none">

<script>
    let registry = [];
    let toDelete = new Set();

    document.getElementById('file-input').onchange = e => loadFiles(e.target.files);
    const dz = document.getElementById('drop-zone');
    dz.onclick = () => document.getElementById('file-input').click();

    function loadFiles(files) {
        const imgs = [...files].filter(f => f.type.startsWith('image/'));
        let done = 0;
        imgs.forEach(file => {
            const r = new FileReader();
            r.onload = e => {
                registry.push({ id: crypto.randomUUID(), name: file.name, dataUrl: e.target.result });
                if (++done === imgs.length) {
                    document.getElementById('btn-scan').disabled = false;
                    renderGrid(); 
                }
            };
            r.readAsDataURL(file);
        });
    }

    function renderGrid() {
        const main = document.getElementById('main');
        main.innerHTML = '<div class="image-grid"></div>';
        const grid = main.querySelector('.image-grid');
        registry.forEach(item => {
            const card = document.createElement('div');
            card.className = `card ${toDelete.has(item.id) ? 'state-delete' : ''}`;
            card.innerHTML = `
                <img src="${item.dataUrl}">
                <div class="card-name">${item.name}</div>
            `;
            card.onclick = () => {
                if (toDelete.has(item.id)) toDelete.delete(item.id);
                else toDelete.add(item.id);
                renderGrid();
                updateStats();
            };
            grid.appendChild(card);
        });
    }

    function updateStats() {
        document.getElementById('topbar-stats').style.display = 'flex';
        document.getElementById('ts-total').textContent = registry.length;
        document.getElementById('ts-delete').textContent = toDelete.size;
        document.getElementById('btn-delete').disabled = toDelete.size === 0;
    }

    function scan() { alert("RUNNING PERCEPTUAL HASH ANALYSIS..."); }
    
    function deleteMarked() {
        if(confirm("CONFIRM PERMANENT REMOVAL FROM SESSION?")) {
            registry = registry.filter(i => !toDelete.has(i.id));
            toDelete.clear();
            renderGrid();
            updateStats();
        }
    }
</script>
</body>
</html>

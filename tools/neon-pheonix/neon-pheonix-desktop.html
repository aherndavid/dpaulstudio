<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON PHOENIX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * { box-sizing: border-box; }

        body {
            background-color: #000;
            color: #00FF41;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            height: 95vh;
            aspect-ratio: 9 / 16;
            border: 2px solid #00FF41;
            box-shadow: 0 0 20px #00FF41, inset 0 0 10px #00FF41;
            background: #000;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #game-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            text-align: center;
            z-index: 10;
        }

        h1 { font-size: 3.5vh; text-shadow: 0 0 10px #00FF41; margin-bottom: 2vh; }
        p { font-size: 1.2vh; line-height: 1.6; }

        input {
            background: black;
            border: 1px solid #00FF41;
            color: #00FF41;
            font-family: 'Press Start 2P', cursive;
            padding: 10px;
            text-align: center;
            margin-top: 2vh;
            font-size: 1.8vh;
            width: 60%;
            outline: none;
        }

        .back-link {
            margin-top: 3vh;
            color: #00FF41;
            text-decoration: none;
            font-size: 1vh;
            border: 1px solid #00FF41;
            padding: 8px 12px;
            transition: background 0.3s;
        }
        .back-link:hover { background: rgba(0, 255, 65, 0.2); }

        .credit-text {
            font-size: 1vh;
            margin-top: 4vh;
            color: #39FF14;
            opacity: 0.8;
        }

        .controls-hint {
            position: absolute;
            bottom: 18px;
            left: 0; right: 0;
            text-align: center;
            font-size: 1vh;
            color: rgba(0,255,65,0.35);
            letter-spacing: .15em;
            z-index: 3;
            pointer-events: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="start-screen" class="ui-overlay">
            <h1>NEON PHOENIX</h1>
            <p>PRESS SPACE TO START</p>
            <a href="https://dpaul.studio/fun.html" class="back-link">TAKE ME BACK</a>
            <div class="credit-text">MUSIC BY<br>LOGAN AHERN</div>
        </div>

        <div id="game-over-screen" class="ui-overlay hidden">
            <h2 style="font-size: 3vh;">GAME OVER</h2>
            <p id="final-score" style="margin-bottom: 2vh;"></p>
            <p>ENTER INITIALS:</p>
            <input type="text" id="player-name" maxlength="3" value="AAA">
            <p style="font-size: 1vh; margin-top: 2vh;">PRESS ENTER TO SAVE</p>
            <a href="https://dpaul.studio/fun.html" class="back-link">EXIT</a>
            <div class="credit-text">MUSIC BY LOGAN AHERN</div>
        </div>

        <div class="controls-hint">&#9664; &#9654; MOVE &nbsp;|&nbsp; SPACE FIRE</div>
    </div>

<script>
/** AUDIO ENGINE **/
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const bgMusic = new Audio();
bgMusic.crossOrigin = "anonymous";
bgMusic.src = 'https://files.catbox.moe/yt0gcw.mp3';
bgMusic.loop = true;
bgMusic.volume = 0.5;

function playSound(freq, type, duration, vol = 0.1) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

const sounds = {
    shoot:     () => playSound(600, 'square', 0.1),
    explosion: () => playSound(100, 'sawtooth', 0.3, 0.2),
    hit:       () => playSound(1200, 'sine', 0.05),
    start:     () => { playSound(440, 'square', 0.1); setTimeout(() => playSound(880, 'square', 0.2), 100); }
};

/** GAME ENGINE **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const nameInput = document.getElementById('player-name');

const CW = 360, CH = 640;
canvas.width = CW;
canvas.height = CH;

let score = 0, lives = 3, gameRunning = false;
let enemies = [], bullets = [];
let player = { x: CW/2, y: CH - 60, w: 30, h: 20, speed: 5 };
let keys = {};

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (e.code === 'Space' && !gameRunning && gameOverScreen.classList.contains('hidden')) startGame();
    if (e.code === 'Enter' && !gameOverScreen.classList.contains('hidden')) location.reload();
});
window.addEventListener('keyup', e => keys[e.code] = false);

function startGame() {
    score = 0; lives = 3; enemies = []; bullets = [];
    gameRunning = true;
    startScreen.classList.add('hidden');
    sounds.start();
    bgMusic.play().catch(() => {});
    spawnWave();
    animate();
}

function spawnWave() {
    for (let i = 0; i < 5; i++)
        for (let j = 0; j < 4; j++)
            enemies.push({ x: 50 + i*65, y: 60 + j*50, radius: 12, phase: Math.random()*Math.PI*2, type: j===0?'bird':'grunt' });
}

function drawPlayer() {
    ctx.strokeStyle = '#39FF14'; ctx.lineWidth = 2;
    ctx.shadowBlur = 10; ctx.shadowColor = '#39FF14';
    ctx.beginPath();
    ctx.moveTo(player.x, player.y - 15);
    ctx.lineTo(player.x - 15, player.y + 10);
    ctx.lineTo(player.x - 5,  player.y + 5);
    ctx.lineTo(player.x + 5,  player.y + 5);
    ctx.lineTo(player.x + 15, player.y + 10);
    ctx.closePath(); ctx.stroke();
}

function drawFuzzyBall(x, y, radius) {
    ctx.strokeStyle = '#39FF14'; ctx.lineWidth = 1;
    ctx.shadowBlur = 15; ctx.shadowColor = '#00FF41';
    ctx.beginPath();
    const spikes = 16;
    for (let i = 0; i < spikes; i++) {
        const angle = (i/spikes)*Math.PI*2;
        const fuzz  = 0.8 + Math.random()*0.4;
        ctx.moveTo(x + Math.cos(angle)*radius*0.4, y + Math.sin(angle)*radius*0.4);
        ctx.lineTo(x + Math.cos(angle)*radius*fuzz, y + Math.sin(angle)*radius*fuzz);
    }
    ctx.stroke();
}

function drawEnemy(e) {
    if (e.type === 'bird') {
        ctx.strokeStyle = '#00FF41'; ctx.lineWidth = 1.5;
        ctx.shadowBlur = 5; ctx.shadowColor = '#00FF41';
        ctx.beginPath();
        let w = Math.sin(Date.now()*0.01)*12;
        ctx.moveTo(e.x, e.y);
        ctx.lineTo(e.x-18, e.y-5+w); ctx.lineTo(e.x, e.y+12);
        ctx.lineTo(e.x+18, e.y-5+w); ctx.closePath(); ctx.stroke();
    } else { drawFuzzyBall(e.x, e.y, e.radius); }
}

function update() {
    if (!gameRunning) return;
    if (keys['ArrowLeft']  && player.x > 25)      player.x -= player.speed;
    if (keys['ArrowRight'] && player.x < CW - 25)  player.x += player.speed;
    if (keys['Space'] && bullets.filter(b => b.fromPlayer).length < 3) {
        bullets.push({ x: player.x, y: player.y-10, speed: -8, fromPlayer: true });
        sounds.shoot(); keys['Space'] = false;
    }
    bullets.forEach((b,i) => { b.y += b.speed; if (b.y<0||b.y>CH) bullets.splice(i,1); });
    enemies.forEach((e,ei) => {
        e.x += Math.sin(Date.now()*0.002+e.phase)*1.8; e.y += 0.25;
        bullets.forEach((b,bi) => {
            const hw = e.type==='bird'?18:e.radius+2, hh = e.type==='bird'?15:e.radius+2;
            if (b.fromPlayer && b.x>e.x-hw && b.x<e.x+hw && b.y>e.y-hh && b.y<e.y+hh) {
                enemies.splice(ei,1); bullets.splice(bi,1); score+=100; sounds.explosion();
                if (enemies.length===0) spawnWave();
            }
        });
        if (Math.random()<0.006) bullets.push({ x:e.x, y:e.y+10, speed:5, fromPlayer:false });
        if (e.y > CH-40) endGame();
    });
    bullets.forEach((b,bi) => {
        if (!b.fromPlayer && b.x>player.x-15 && b.x<player.x+15 && b.y>player.y-10 && b.y<player.y+15) {
            bullets.splice(bi,1); lives--; sounds.hit(); if (lives<=0) endGame();
        }
    });
}

function endGame() {
    gameRunning = false; bgMusic.pause(); bgMusic.currentTime = 0;
    document.getElementById('final-score').innerText = "SCORE: "+score;
    gameOverScreen.classList.remove('hidden'); nameInput.focus();
}

function draw() {
    ctx.clearRect(0,0,CW,CH);
    ctx.fillStyle='#00FF41'; ctx.font='12px "Press Start 2P"'; ctx.shadowBlur=0;
    ctx.fillText(`SC: ${score}`,15,35); ctx.fillText(`LV: ${lives}`,265,35);
    drawPlayer(); enemies.forEach(drawEnemy);
    ctx.lineWidth=2;
    bullets.forEach(b => {
        ctx.strokeStyle='#39FF14'; ctx.shadowBlur=5; ctx.shadowColor='#39FF14';
        ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x,b.y+(b.fromPlayer?-12:12)); ctx.stroke();
    });
}

function animate() {
    if (!gameRunning) return;
    update(); draw(); requestAnimationFrame(animate);
}

draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>dPaul TTS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #131413;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 16px 12px;
        }
        .outer-wrap { width: 100%; max-width: 420px; }
        .container {
            width: 100%;
            background: linear-gradient(145deg, #4a0a0a, #6a1010);
            border-radius: 12px;
            padding: 16px 32px;
            box-shadow: 0 14px 39px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1), inset 0 -1px 0 rgba(0,0,0,0.3);
            border: 1px solid rgba(58,5,5,0.3);
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 35%;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 100%);
            border-radius: 12px 12px 0 0;
            pointer-events: none;
        }

        /* PWR LED */
        .pwr-led-wrap {
            position: absolute; top: 14px; right: 16px;
            display: flex; flex-direction: column; align-items: center; gap: 3px; z-index: 10;
        }
        .pwr-led {
            width: 10px; height: 10px; border-radius: 2px;
            background: #1a0000; border: 1px solid #2a0000;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.9);
            transition: background 0.08s, box-shadow 0.08s;
        }
        .pwr-led.on { background: #dd0000; border-color: #aa0000; box-shadow: 0 0 6px rgba(220,0,0,0.95), 0 0 14px rgba(220,0,0,0.5); }
        .pwr-led-label { font-family: 'Courier New', monospace; font-size: 5.5px; font-weight: bold; letter-spacing: 1px; color: #3a0000; text-transform: none; }

        h1 { color: #000; font-size: 22px; font-weight: 900; margin-bottom: 12px; letter-spacing: 0.5px; font-family: Impact, 'Arial Black', sans-serif; }

        /* SECTIONS */
        .section {
            background: #0a0a0a; border-radius: 5px; padding: 8px;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.5), inset 0 -1px 0 rgba(255,255,255,0.05), 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid #000;
            margin-bottom: 7px;
        }
        .section-title { color: #888; font-size: 9px; font-weight: 700; margin-bottom: 7px; text-transform: none; letter-spacing: 0.8px; font-family: 'Courier New', monospace; }
        label { display: block; color: #666; font-size: 9px; font-weight: 700; margin-bottom: 3px; text-transform: none; letter-spacing: 0.5px; font-family: 'Courier New', monospace; }

        /* API KEY */
        .api-row { display: flex; gap: 6px; align-items: center; }
        .api-input {
            flex: 1; padding: 7px 8px; background: #001a00; border: 1px solid #000; border-radius: 3px;
            color: #00dd00; font-size: 10px; font-family: 'Courier New', monospace;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
        .api-input::placeholder { color: #004400; font-size: 9px; }
        .api-input:focus { outline: none; }
        .btn-save-key { padding: 7px 10px !important; font-size: 8px !important; flex: none !important; white-space: nowrap; min-height: unset !important; }
        .api-note { color: #444; font-size: 8px; font-family: 'Courier New', monospace; text-align: center; margin-top: 5px; }
        .api-note a { color: #555; }

        /* TEXTAREA */
        textarea {
            width: 100%; height: 140px; padding: 10px;
            background: #001a00; border: 1px solid #000; border-radius: 3px;
            color: #00dd00; font-size: 15px; font-family: 'Courier New', monospace;
            resize: none; line-height: 1.4;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), inset 0 0 22px rgba(0,80,0,0.15);
        }
        textarea::placeholder { color: #004400; font-size: 9px; }
        textarea:focus { outline: none; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), inset 0 0 22px rgba(0,100,0,0.25); }

        /* SELECT */
        select {
            padding: 6px 4px; background: #0a0a0a; border: 1px solid #000; border-radius: 3px;
            color: #fff; font-size: 9px; cursor: pointer; width: 100%;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.5);
            font-family: 'Courier New', monospace;
        }
        select:focus { outline: none; }
        select option { background: #1a1a1a; color: #fff; }
        #unrealVoiceSelect { font-size: 13px; padding: 8px 6px; }
        #unrealVoiceSelect option { font-size: 15px; }

        /* INC/DEC BUTTONS */
        .inc-row { display: flex; align-items: center; gap: 6px; }
        .inc-btn {
            width: 34px !important; height: 34px !important; min-height: unset !important;
            padding: 0 !important; font-size: 20px !important; font-weight: 900 !important;
            flex: none !important; border-radius: 4px !important; line-height: 1 !important;
            display: flex !important; align-items: center !important; justify-content: center !important;
        }
        .inc-value {
            flex: 1; text-align: center; color: #00dd00; font-size: 13px; font-weight: 700;
            font-family: 'Courier New', monospace; background: #001a00; border: 1px solid #000;
            border-radius: 3px; padding: 6px 0; box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
        }

        /* TWO-COLUMN PARAMS ROW */
        .params-row { display: flex; gap: 7px; }
        .params-row .section { flex: 1; margin-bottom: 0; }

        /* BUTTONS */
        .button-group { display: flex; flex-direction: row; gap: 8px; margin-bottom: 7px; }
        button {
            padding: 11px 16px; background: linear-gradient(145deg, #3a3a3a, #1a1a1a);
            border: 1px solid #000; border-radius: 3px; color: #888;
            font-size: 9px; font-weight: 700; cursor: pointer; transition: all 0.15s;
            letter-spacing: 0.5px; text-transform: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            flex: 1; font-family: 'Courier New', monospace;
        }
        button:hover { background: linear-gradient(145deg, #444, #222); transform: translateY(-1px); }
        button:active { transform: translateY(1px); box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
        button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        button:disabled:hover { background: linear-gradient(145deg, #3a3a3a, #1a1a1a); transform: none; }
        .btn-primary { background: linear-gradient(145deg, #666, #444); color: #fff; }
        .btn-primary:hover { background: linear-gradient(145deg, #777, #555); }

        /* STATUS */
        .status {
            padding: 8px; background: #001a00; border-radius: 3px; text-align: center;
            color: #00aa00; font-size: 9px; font-weight: 600; text-transform: none;
            letter-spacing: 0.5px; font-family: 'Courier New', monospace;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.8), inset 0 0 17px rgba(0,80,0,0.15);
            border: 1px solid #000; margin-bottom: 7px;
        }
        .status.active { color: #00dd00; box-shadow: inset 0 2px 3px rgba(0,0,0,0.8), inset 0 0 17px rgba(0,120,0,0.25); }
        .status.error { color: #dd4444; }

        audio { width: 100%; border-radius: 3px; height: 28px; display: none; }
        audio.visible { display: block; }

        /* MODE TOGGLE */
        .mode-toggle { display: flex; gap: 5px; margin-bottom: 7px; }
        .mode-btn { flex: 1; padding: 8px !important; font-size: 8px !important; }
        .mode-btn.active { background: linear-gradient(145deg, #550000, #330000) !important; color: #ff6666 !important; border-color: #440000 !important; }
    </style>
</head>
<body>
<div class="outer-wrap">
    <div class="container">
        <div class="pwr-led-wrap">
            <div class="pwr-led" id="pwrLed"></div>
            <div class="pwr-led-label">PWR</div>
        </div>

        <h1>dPaul TTS <span style="font-size:11px;letter-spacing:2px;opacity:0.6;font-family:Impact,'Arial Black',sans-serif;">v3.1</span></h1>

        <!-- MODE TOGGLE -->
        <div class="mode-toggle">
            <button class="mode-btn active" id="modeUnreal" onclick="setMode('unreal')">⚡ UNREAL SPEECH</button>
            <button class="mode-btn" id="modeBrowser" onclick="setMode('browser')">BROWSER TTS</button>
        </div>

        <!-- UNREAL SPEECH PANEL -->
        <div id="unrealPanel">
            <div class="section">
                <label>Unreal Speech API Key</label>
                <div class="api-row">
                    <input type="password" class="api-input" id="apiKey" placeholder="Paste your API key here...">
                    <button class="btn-save-key" onclick="saveKey()">SAVE</button>
                </div>
                <div class="api-note">Free tier · <a href="https://unrealspeech.com" target="_blank">unrealspeech.com</a></div>
            </div>

            <div class="section">
                <div class="section-title">VOICE</div>
                <select id="unrealVoiceSelect">
                    <option value="af_sarah">Sarah — Female (US)</option>
                    <option value="af_bella">Bella — Female (US)</option>
                    <option value="af_nicole">Nicole — Female (US)</option>
                    <option value="af_sky">Sky — Female (US)</option>
                    <option value="am_adam">Adam — Male (US)</option>
                    <option value="am_michael">Michael — Male (US)</option>
                    <option value="bf_emma">Emma — Female (UK)</option>
                    <option value="bf_isabella">Isabella — Female (UK)</option>
                    <option value="bm_george">George — Male (UK)</option>
                    <option value="bm_lewis">Lewis — Male (UK)</option>
                </select>
            </div>

            <div class="params-row" style="margin-bottom:7px;">
                <div class="section">
                    <div class="section-title">SPEED</div>
                    <div class="inc-row">
                        <button class="inc-btn" id="uSpeedDown">−</button>
                        <div class="inc-value" id="uSpeedDisplay">0.0</div>
                        <button class="inc-btn" id="uSpeedUp">+</button>
                    </div>
                </div>
                <div class="section">
                    <div class="section-title">PITCH</div>
                    <div class="inc-row">
                        <button class="inc-btn" id="uPitchDown">−</button>
                        <div class="inc-value" id="uPitchDisplay">1.0</div>
                        <button class="inc-btn" id="uPitchUp">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- BROWSER TTS PANEL -->
        <div id="browserPanel" style="display:none;">
            <div class="section">
                <div class="section-title">VOICE</div>
                <select id="voiceSelect"><option value="">Loading voices...</option></select>
            </div>

            <div class="params-row" style="margin-bottom:7px;">
                <div class="section">
                    <div class="section-title">SPEED</div>
                    <div class="inc-row">
                        <button class="inc-btn" id="rateDown">−</button>
                        <div class="inc-value" id="rateDisplay">1.0×</div>
                        <button class="inc-btn" id="rateUp">+</button>
                    </div>
                </div>
                <div class="section">
                    <div class="section-title">PITCH</div>
                    <div class="inc-row">
                        <button class="inc-btn" id="pitchDown">−</button>
                        <div class="inc-value" id="pitchDisplay">1.0</div>
                        <button class="inc-btn" id="pitchUp">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SCRIPT -->
        <div class="section">
            <label>SCRIPT</label>
            <textarea id="textInput" placeholder="Enter your script here..."></textarea>
        </div>

        <!-- CONTROLS -->
        <div class="button-group">
            <button class="btn-primary" id="speakBtn">SPEAK</button>
            <button id="clearBtn">CLEAR</button>
            <button id="stopBtn" disabled>STOP</button>
        </div>

        <div class="status" id="status">Ready</div>
        <audio id="audioPlayer" controls></audio>
    </div>
</div>

<a href="https://www.dpaul.studio/tools" target="_top" style="
    display: block;
    width: 100%;
    max-width: 420px;
    margin: 14px auto 0;
    padding: 13px 0;
    background: #000;
    border: 2px solid #ff6600;
    border-radius: 6px;
    color: #ff6600;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: none;
    text-align: center;
    text-decoration: none;
    box-sizing: border-box;
">← Tools</a>

<script>
'use strict';

/* ── LED ── */
const pwrLed = document.getElementById('pwrLed');
let blinkInterval = null;
function ledOn()  { pwrLed.classList.add('on'); }
function ledOff() { pwrLed.classList.remove('on'); }
function startBlink() { ledOn(); blinkInterval = setInterval(() => pwrLed.classList.toggle('on'), 400); }
function stopBlink()  { clearInterval(blinkInterval); blinkInterval = null; ledOff(); }
ledOn();

/* ── MODE ── */
let currentMode = 'unreal';
function setMode(m) {
    currentMode = m;
    document.getElementById('unrealPanel').style.display  = m === 'unreal'  ? '' : 'none';
    document.getElementById('browserPanel').style.display = m === 'browser' ? '' : 'none';
    document.getElementById('modeUnreal').classList.toggle('active',  m === 'unreal');
    document.getElementById('modeBrowser').classList.toggle('active', m === 'browser');
    document.getElementById('audioPlayer').classList.remove('visible');
    document.getElementById('stopBtn').disabled = true;
    setStatus('Ready');
    ledOn();
}

/* ── API KEY ── */
function saveKey() {
    const k = document.getElementById('apiKey').value.trim();
    if (!k) { setStatus('No key entered', false, true); return; }
    setStatus('Key saved — ready to speak', true);
}
function getKey() { return document.getElementById('apiKey').value.trim() || ''; }

/* ── UNREAL SPEECH SPEED / PITCH (inc/dec) ── */
const uParams = {
    speed: { val: 0.0, min: -1.0, max: 1.0, step: 0.1 },
    pitch: { val: 1.0, min: 0.5,  max: 1.5, step: 0.1 }
};
function uFmt(key) { return uParams[key].val.toFixed(1); }
function uUpdateDisplay(key) {
    document.getElementById(key === 'speed' ? 'uSpeedDisplay' : 'uPitchDisplay').textContent = uFmt(key);
}
function uStep(key, dir) {
    const p = uParams[key];
    p.val = Math.round((p.val + dir * p.step) * 10) / 10;
    p.val = Math.max(p.min, Math.min(p.max, p.val));
    uUpdateDisplay(key);
}
document.getElementById('uSpeedDown').addEventListener('click', () => uStep('speed', -1));
document.getElementById('uSpeedUp').addEventListener('click',   () => uStep('speed', +1));
document.getElementById('uPitchDown').addEventListener('click', () => uStep('pitch', -1));
document.getElementById('uPitchUp').addEventListener('click',   () => uStep('pitch', +1));

/* ── BROWSER TTS SPEED / PITCH ── */
const synth = window.speechSynthesis;
const bParams = {
    rate:  { val: 1.0, min: 0.5, max: 2.0, step: 0.1 },
    pitch: { val: 1.0, min: 0.5, max: 2.0, step: 0.1 }
};
function bFmt(key) { const v = bParams[key].val; return key === 'rate' ? v.toFixed(1) + '×' : v.toFixed(1); }
function bUpdateDisplay(key) { document.getElementById(key === 'rate' ? 'rateDisplay' : 'pitchDisplay').textContent = bFmt(key); }
function bStep(key, dir) {
    const p = bParams[key];
    p.val = Math.round((p.val + dir * p.step) * 1000) / 1000;
    p.val = Math.max(p.min, Math.min(p.max, p.val));
    bUpdateDisplay(key);
}
document.getElementById('rateDown').addEventListener('click',  () => bStep('rate', -1));
document.getElementById('rateUp').addEventListener('click',    () => bStep('rate', +1));
document.getElementById('pitchDown').addEventListener('click', () => bStep('pitch', -1));
document.getElementById('pitchUp').addEventListener('click',   () => bStep('pitch', +1));

/* ── BROWSER VOICES ── */
function loadBrowserVoices() {
    let all = synth.getVoices();
    let list = all.filter(v => v.name.toLowerCase().includes('google'));
    if (!list.length) list = all;
    const sel = document.getElementById('voiceSelect');
    sel.innerHTML = '';
    if (!list.length) { sel.innerHTML = '<option>No voices found</option>'; return; }
    let ukIdx = -1;
    list.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${v.name} (${v.lang})`;
        sel.appendChild(opt);
        if (v.name.toLowerCase().includes('uk') && v.name.toLowerCase().includes('male')) ukIdx = i;
    });
    if (ukIdx !== -1) sel.value = ukIdx;
    window._ttsVoices = list;
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadBrowserVoices;
loadBrowserVoices();

function browserSpeak(text) {
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    const idx = document.getElementById('voiceSelect').value;
    utt.voice = (window._ttsVoices && window._ttsVoices[idx]) ? window._ttsVoices[idx] : null;
    utt.rate  = bParams.rate.val;
    utt.pitch = bParams.pitch.val;
    utt.onstart = () => { setStatus('Speaking...', true); setBusy(true); };
    utt.onend   = () => { setStatus('Finished'); setBusy(false); };
    utt.onerror = e => { setStatus('Error: ' + e.error, false, true); setBusy(false); };
    synth.speak(utt);
}

/* ── UNREAL SPEECH ── */
// FIX: keys must be PascalCase (Text, VoiceId, Bitrate, Speed, Pitch, Codec)
// Speed and Pitch must be sent as strings per the API spec
let currentAudioUrl = null;
async function unrealSpeak(text) {
    const apiKey = getKey();
    if (!apiKey) { setStatus('No API key — paste & save your key', false, true); return; }

    const voiceId = document.getElementById('unrealVoiceSelect').value;
    const speed   = uParams.speed.val;   // number
    const pitch   = uParams.pitch.val;   // number

    setBusy(true);
    setStatus('Generating audio...', true);

    try {
        const res = await fetch('https://api.v8.unrealspeech.com/stream', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                Text:    text,
                VoiceId: voiceId,
                Bitrate: '192k',
                Speed:   speed,
                Pitch:   pitch
            })
        });

        if (!res.ok) {
            let errMsg = `HTTP ${res.status}`;
            try { const err = await res.json(); errMsg = err.message || err.error || errMsg; } catch(e) {}
            throw new Error(errMsg);
        }

        const blob = await res.blob();
        if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
        currentAudioUrl = URL.createObjectURL(blob);

        const player = document.getElementById('audioPlayer');
        player.src = currentAudioUrl;
        player.classList.add('visible');
        player.play();
        player.onended = () => { setStatus('Finished'); setBusy(false); };
        setStatus('Playing...', true);

    } catch(e) {
        setStatus('Error: ' + e.message, false, true);
        setBusy(false);
    }
}

/* ── SHARED UTILS ── */
function setStatus(msg, active = false, isError = false) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.classList.toggle('active', active && !isError);
    el.classList.toggle('error', isError);
}
function setBusy(busy) {
    document.getElementById('speakBtn').disabled = busy;
    document.getElementById('stopBtn').disabled  = !busy;
    busy ? startBlink() : (stopBlink(), ledOn());
}

/* ── BUTTON EVENTS ── */
document.getElementById('speakBtn').addEventListener('click', () => {
    const text = document.getElementById('textInput').value.trim();
    if (!text) { setStatus('Please enter text'); return; }
    currentMode === 'unreal' ? unrealSpeak(text) : browserSpeak(text);
});
document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('textInput').value = '';
    document.getElementById('audioPlayer').classList.remove('visible');
    setStatus('Cleared');
});
document.getElementById('stopBtn').addEventListener('click', () => {
    if (currentMode === 'unreal') {
        const p = document.getElementById('audioPlayer');
        p.pause(); p.currentTime = 0;
    } else { synth.cancel(); }
    setStatus('Stopped');
    setBusy(false);
});
</script>
</body>
</html>

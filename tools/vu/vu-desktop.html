<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>dPaul VU Meter</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background-color: #131413; 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
    }

    /* Increased height to 720px to create the longer bottom section */
    .outer-wrap {
        width: 380px; 
        height: 720px; 
        display: flex;
        flex-direction: column;
        position: relative;
    }

    .container {
        width: 100%;
        height: 100%;
        background: linear-gradient(180deg, #1e2b58, #0d152d);
        border-radius: 22px;
        /* Bottom padding increased to 120px to leave empty "device body" space */
        padding: 24px 20px 120px 20px; 
        box-shadow: 0 35px 70px rgba(0,0,0,0.9),
                    inset 0 1px 2px rgba(255,255,255,0.1);
        border: 1px solid #1a2a5a;
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    /* ── Top Right Buttons ── */
    .nav-tools {
        position: absolute;
        top: 24px;
        right: 22px;
        display: flex;
        gap: 10px;
        z-index: 100;
    }

    .round-btn {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #111;
        border: 1px solid #2a3a6a;
        color: #4a6a9a;
        font-size: 14px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .round-btn:hover {
        color: #1a7fff;
        border-color: #1a7fff;
        transform: translateY(-1px);
        box-shadow: 0 0 12px rgba(26, 127, 255, 0.4);
    }

    h1 {
        color: #000;
        font-size: 34px;
        font-weight: 900;
        letter-spacing: -1.5px;
        font-family: Impact, sans-serif;
        margin-bottom: 5px;
        text-transform: uppercase;
    }

    .main-layout { display: flex; flex-direction: column; gap: 14px; }

    .section {
        background: #060606;
        border-radius: 10px;
        padding: 14px;
        border: 1px solid #000;
        box-shadow: inset 0 3px 12px rgba(0,0,0,0.9);
    }

    label {
        display: block;
        color: #444;
        font-size: 10px;
        font-weight: 900;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
    }

    /* ── Digital Display ── */
    .db-readout { text-align: center; padding: 12px 0; }
    .db-number {
        font-family: 'Courier New', monospace;
        font-size: 78px;
        font-weight: 800;
        color: #1a7fff;
        text-shadow: 0 0 25px rgba(26,127,255,0.7);
        line-height: 1;
    }
    .db-unit-label { color: #333; font-size: 11px; text-transform: uppercase; letter-spacing: 4px; margin-top: 10px; font-weight: 700; }

    /* ── Segment bar ── */
    .segments { display: flex; gap: 3px; height: 44px; margin-bottom: 10px; }
    .seg { flex: 1; border-radius: 2px; background: #151515; }
    .seg.lit-blue { background: #1a7fff; box-shadow: 0 0 12px rgba(26,127,255,0.6); }

    .bar-scale {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        font-family: monospace;
        color: #222;
        padding: 0 2px;
    }

    /* ── Peak history ── */
    .peak-list-wrap { height: 60px; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
    .peak-header-row { display: flex; justify-content: space-between; align-items: center; }
    .peak-max-val { font-family: monospace; font-size: 13px; color: #1a7fff; font-weight: bold; }
    .peak-empty { color: #222; font-size: 11px; text-align: center; font-family: monospace; letter-spacing: 1px; }

    /* ── Controls ── */
    .button-group { display: flex; gap: 10px; margin-top: 10px; }
    button:not(.round-btn) {
        flex: 1;
        padding: 16px;
        background: linear-gradient(180deg, #2a2a2a, #151515);
        border: 1px solid #000;
        border-radius: 8px;
        color: #777;
        font-size: 11px;
        font-weight: 900;
        cursor: pointer;
        text-transform: uppercase;
        box-shadow: 0 4px 0 #000;
    }

    button:not(.round-btn):active, button.active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 #000;
        color: #1a7fff;
        border-color: #1a7fff;
    }

    .status {
        margin-top: 12px;
        padding: 15px;
        background: #050a15;
        border-radius: 8px;
        text-align: center;
        color: #1a7fff;
        font-size: 11px;
        font-family: 'Courier New', monospace;
        border: 1px solid #000;
        text-transform: uppercase;
        letter-spacing: 2px;
        box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
    }
</style>
</head>
<body>

<div class="outer-wrap">
    <div class="container">
        <div class="nav-tools">
            <div class="round-btn" onclick="showInfo()" title="Instructions">i</div>
            <a href="https://www.dpaul.studio/tools" class="round-btn" title="Back to Tools">⬉</a>
        </div>

        <h1>dPaul VU <span style="font-size:12px; opacity:0.4; font-family: sans-serif; vertical-align: middle; letter-spacing: 2px;">v2.01</span></h1>

        <div class="main-layout">
            <div class="section">
                <label>Level Display</label>
                <div class="db-readout">
                    <div class="db-number" id="dbDisplay">48.9</div>
                    <div class="db-unit-label">Decibels</div>
                </div>
            </div>

            <div class="section">
                <label>Signal Bar</label>
                <div class="segments" id="segments"></div>
                <div class="bar-scale">
                    <span>-40</span><span>-20</span><span>0</span><span>20</span><span>50</span><span>100</span>
                </div>
            </div>

            <div class="section">
                <div class="peak-header-row">
                    <label style="margin:0;">Peak History</label>
                    <span class="peak-max-val" id="peakMaxVal">Max: —</span>
                </div>
                <div class="peak-list-wrap" id="peakList">
                    <div class="peak-empty" id="peakEmpty">No peaks recorded yet</div>
                </div>
            </div>

            <div class="button-group">
                <button id="btnMic">Mic</button>
                <button id="btnTest">Test</button>
                <button id="btnReset">Reset</button>
            </div>

            <div class="status" id="status">Ready</div>
        </div>
        
        </div>
</div>

<script>
    'use strict';
    const NUM_SEGS = 24;
    const segsEl = document.getElementById('segments');
    for (let i = 0; i < NUM_SEGS; i++) {
        const d = document.createElement('div');
        d.className = 'seg';
        segsEl.appendChild(d);
    }
    const segs = Array.from(segsEl.children);

    function showInfo() {
        alert("Instructions:\n\n1. MIC: Real-time audio analysis.\n2. TEST: Visual system test.\n3. RESET: Clear history.\n4. TOP BUTTONS: Info and Tools return.");
    }

    function setLevel(db) {
        const val = Math.max(0, Math.min(1, (db + 40) / 140));
        const filled = Math.floor(val * NUM_SEGS);
        segs.forEach((s, i) => s.className = i < filled ? 'seg lit-blue' : 'seg');
        document.getElementById('dbDisplay').textContent = db.toFixed(1);
    }

    // Set default value for initial load
    setLevel(48.9);

    document.getElementById('btnMic').addEventListener('click', () => {
        document.getElementById('status').textContent = "Microphone Active...";
        document.getElementById('btnMic').classList.add('active');
    });

    document.getElementById('btnReset').addEventListener('click', () => {
        location.reload();
    });
</script>

</body>
</html>

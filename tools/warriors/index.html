<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DPAUL SpaceTec Warriors | Protocol V1.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'VT323', monospace; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh;
        }

        /* Desktop Branded Header */
        .ui-header { 
            width: 100%; 
            padding: 10px 0;
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            background: #131413;
            border-bottom: 3px solid #f90;
            box-shadow: 0 4px 10px rgba(255, 153, 0, 0.2);
            z-index: 30;
        }

        .studio-logo { color: #f90; font-size: 32px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 153, 0, 0.5); }
        .score-box { color: #ffffff; font-size: 26px; border-left: 2px solid #333; padding-left: 15px; margin-left: 15px; }
        .stat-box { color: #0f0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }

        /* EXIT BUTTON STYLE */
        .exit-btn {
            background: transparent;
            border: 2px solid #f90;
            color: #f90;
            padding: 5px 15px;
            font-family: 'VT323', monospace;
            font-size: 18px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .exit-btn:hover {
            background: #f90;
            color: #000;
            box-shadow: 0 0 15px #f90;
        }

        #gameCanvas { 
            background: #000; 
            height: calc(100vh - 100px); 
            aspect-ratio: 4 / 5;
            image-rendering: pixelated;
            border: 2px solid #111;
        }

        .msg-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.9); text-align: center; z-index: 20; 
        }

        input { background: #000; border: 2px solid #f90; color: #f90; font-family: 'VT323', monospace; font-size: 28px; text-align: center; margin: 15px; outline: none; padding: 5px; }
        button.start-btn { background: #f90; color: #000; border: none; padding: 12px 40px; font-family: 'VT323', monospace; cursor: pointer; font-size: 24px; font-weight: bold; }
        button.start-btn:hover { background: #fff; transform: scale(1.05); }
        
        .high-score-list { color: #888; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="ui-header">
        <div class="stat-box">LEVEL: <span id="levelDisp" style="color:#fff">1</span></div>
        <div class="studio-logo">DPAUL SpaceTec Warriors <span class="score-box">SCORE: <span id="score" style="color:#f90">0000</span></span></div>
        <div class="stat-box">HULL: <span id="livesDisp">▲ ▲ ▲</span> | SHIELDS: <span id="shieldDisp" style="color:#0ff">3</span></div>
        
        <a href="https://www.dpaul.studio" target="_blank" class="exit-btn">[ EXIT TO STUDIO ]</a>
    </div>

    <div id="overlay" class="msg-overlay">
        <h1 id="titleHead" style="font-size: 80px; margin: 0; color: #f90; text-shadow: 4px 4px #4a0a0a;">SYSTEM INITIALIZATION</h1>
        <div id="loginSection">
            <p style="color: #fff; font-size: 24px;">PILOT AUTHENTICATION REQUIRED:</p>
            <input type="text" id="pilotInput" maxlength="10" placeholder="ENTER_ID">
            <br>
            <button class="start-btn" onclick="startGame()">[ DEPLOY WARRIOR ]</button>
            <div id="highScoreDisplay" class="high-score-list"></div>
        </div>
        <p style="color: #444; margin-top: 40px; font-size: 18px;">[SPACE] CANNONS | [X] SHIELD | [R] EMERGENCY RESET</p>
    </div>

    <canvas id="gameCanvas" width="800" height="1000"></canvas>

<script>
// (JavaScript logic remains intact)
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let score = 0, lives = 3, level = 1, gameOver = true;
let enemies = [], bullets = [], enemyBullets = [], stars = [];
let shieldsLeft = 3, shieldActive = false, shieldTimer = 0, hitFlash = 0;
let boss = null;
let pilotID = "GUEST";

function updateHighScoreUI() {
    const saved = localStorage.getItem('spacetech_highscore') || 0;
    const savedName = localStorage.getItem('spacetech_pilot') || "NONE";
    document.getElementById('highScoreDisplay').innerText = `ALL-TIME ACE: ${savedName} - ${saved}`;
}
updateHighScoreUI();

const ship = {
    x: 400, y: 920, speed: 8,
    draw() {
        if (hitFlash > 0 && hitFlash % 2 === 0) return; 
        if (shieldActive) {
            ctx.strokeStyle = '#0ff'; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.arc(this.x, this.y + 10, 60, 0, Math.PI * 2); ctx.stroke();
        }
        ctx.fillStyle = '#555'; ctx.fillRect(this.x - 34, this.y, 6, 45); ctx.fillRect(this.x + 28, this.y, 6, 45);
        ctx.fillStyle = '#000'; ctx.fillRect(this.x - 34, this.y, 6, 10); ctx.fillRect(this.x + 28, this.y, 6, 10);
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(this.x, this.y - 20); ctx.lineTo(this.x - 28, this.y + 35); ctx.lineTo(this.x + 28, this.y + 35); ctx.fill();
        ctx.fillStyle = '#f90'; ctx.beginPath(); ctx.moveTo(this.x, this.y + 35); ctx.lineTo(this.x - 18, this.y + 55); ctx.lineTo(this.x + 18, this.y + 55); ctx.fill();
        ctx.fillStyle = '#222'; ctx.fillRect(this.x - 4, this.y + 5, 8, 12);
    }
};

function playSound(freq, type, duration, vol = 0.15) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

class Enemy {
    constructor(x, y, type) { this.x = x; this.y = y; this.baseX = x; this.type = type; this.diving = false; }
    update() {
        if (!this.diving) {
            this.x = this.baseX + Math.sin(Date.now() / 500) * 180;
            if (Math.random() < 0.004 * level) this.diving = true;
        } else {
            this.y += 5 + level; this.x += Math.sin(this.y / 25) * 10;
            if (this.y > 1050) { this.y = -50; this.diving = false; }
        }
        if (Math.random() < 0.018) fireEnemyBullet(this.x, this.y);
    }
    draw() {
        ctx.fillStyle = this.type === 'elite' ? '#f00' : '#f0f';
        ctx.beginPath(); ctx.moveTo(this.x - 22, this.y); ctx.lineTo(this.x + 22, this.y); ctx.lineTo(this.x, this.y + 30); ctx.fill();
    }
}

class Mothership {
    constructor() { this.x = 200; this.y = -200; this.w = 400; this.h = 120; this.hp = 75; this.dir = 1; }
    update() {
        if (this.y < 120) this.y += 0.8;
        this.x += this.dir * 3;
        if (this.x < 80 || this.x > 320) this.dir *= -1;
        if (Math.random() < 0.15) fireEnemyBullet(this.x + Math.random() * this.w, this.y + this.h);
    }
    draw() {
        ctx.fillStyle = '#222'; ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.fillStyle = '#0ff'; ctx.fillRect(this.x + 140, this.y + 80, 120, 40);
        ctx.fillStyle = '#f90'; ctx.font = "32px VT323";
        ctx.fillText("WARSHIP INTEGRITY: " + this.hp, this.x + 80, this.y - 25);
    }
}

for (let i = 0; i < 100; i++) stars.push({ x: Math.random() * 800, y: Math.random() * 1000, s: 1 + Math.random() * 4 });

const keys = {};
window.onkeydown = (e) => {
    keys[e.code] = true;
    if (e.code === 'KeyR') location.reload();
    if (e.code === 'KeyX' && shieldsLeft > 0 && !shieldActive && !gameOver) {
        shieldActive = true; shieldsLeft--; shieldTimer = 180;
        playSound(140, 'sawtooth', 1.5);
    }
};
window.onkeyup = (e) => keys[e.code] = false;

function fireEnemyBullet(x, y) { enemyBullets.push({ x, y, speed: 6 + level }); }

function spawnLevel() {
    enemies = []; boss = null;
    if (level < 3) {
        for (let i = 0; i < 10; i++) enemies.push(new Enemy(150 + i * 55, 180, level === 1 ? 'basic' : 'elite'));
    } else { boss = new Mothership(); }
}

function startGame() {
    const input = document.getElementById('pilotInput').value.trim();
    pilotID = input || "WARRIOR_1";
    document.getElementById('overlay').style.display = 'none';
    gameOver = false; lives = 3; score = 0; level = 1; shieldsLeft = 3;
    spawnLevel(); requestAnimationFrame(gameLoop);
}

function checkHighScore() {
    const saved = localStorage.getItem('spacetech_highscore') || 0;
    if (score > saved) {
        localStorage.setItem('spacetech_highscore', score);
        localStorage.setItem('spacetech_pilot', pilotID);
    }
    updateHighScoreUI();
}

function gameLoop() {
    if (gameOver) return;
    ctx.clearRect(0, 0, 800, 1000);
    ctx.fillStyle = '#fff';
    stars.forEach(s => { s.y += s.s; if (s.y > 1000) s.y = 0; ctx.fillRect(s.x, s.y, s.s, s.s); });

    if (shieldActive) { shieldTimer--; if (shieldTimer <= 0) shieldActive = false; }
    if (hitFlash > 0) hitFlash--;

    if (keys['ArrowLeft'] && ship.x > 45) ship.x -= ship.speed;
    if (keys['ArrowRight'] && ship.x < 755) ship.x += ship.speed;
    if (keys['Space']) {
        if (bullets.length < 6) {
            bullets.push({ x: ship.x, y: ship.y, speed: 14 });
            playSound(750, 'square', 0.05);
        }
        keys['Space'] = false;
    }

    bullets.forEach((b, i) => {
        b.y -= b.speed;
        if (b.y < 0) bullets.splice(i, 1);
        if (boss && b.x > boss.x + 140 && b.x < boss.x + 260 && b.y < boss.y + 120) {
            boss.hp--; bullets.splice(i, 1); playSound(130, 'square', 0.1);
            if (boss.hp <= 0) { score += 7500; gameOver = true; checkHighScore(); document.getElementById('overlay').style.display = 'flex'; document.getElementById('titleHead').innerText = "SYSTEM_CLEARED"; }
        }
    });

    enemyBullets.forEach((b, i) => {
        b.y += b.speed;
        if (b.y > 1000) enemyBullets.splice(i, 1);
        if (!shieldActive && hitFlash <= 0 && Math.abs(b.x - ship.x) < 30 && Math.abs(b.y - ship.y) < 30) {
            enemyBullets.splice(i, 1); lives--; hitFlash = 45; playSound(50, 'square', 0.7);
            if (lives <= 0) { gameOver = true; checkHighScore(); document.getElementById('overlay').style.display = 'flex'; document.getElementById('titleHead').innerText = "UNIT_LOST"; }
        }
    });

    enemies.forEach((e, i) => {
        e.update(); e.draw();
        bullets.forEach((b, bi) => {
            if (Math.abs(b.x - e.x) < 35 && Math.abs(b.y - e.y) < 35) {
                enemies.splice(i, 1); bullets.splice(bi, 1); score += 100; playSound(95, 'square', 0.18);
            }
        });
    });

    if (boss) { boss.update(); boss.draw(); }
    if (!boss && enemies.length === 0) { level++; spawnLevel(); }

    ship.draw();
    ctx.fillStyle = '#0f0'; bullets.forEach(b => ctx.fillRect(b.x-4, b.y, 8, 20));
    ctx.fillStyle = '#f00'; enemyBullets.forEach(b => ctx.fillRect(b.x-4, b.y, 8, 20));
    
    document.getElementById('score').innerText = score.toString().padStart(4, '0');
    document.getElementById('levelDisp').innerText = level;
    document.getElementById('shieldDisp').innerText = shieldsLeft;
    document.getElementById('livesDisp').innerText = "▲ ".repeat(lives);
    
    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>

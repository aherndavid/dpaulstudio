<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dPaul TTS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            min-height: 100%;
            background: #131413; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
        }

        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            padding: 20px 15px; /* Reduced top/bottom padding */
            overflow-y: auto; 
        }

        .container {
            width: 100%; 
            max-width: 420px;
            background: linear-gradient(145deg, #4a0a0a, #6a1010);
            border-radius: 18px; 
            padding: 18px; /* Slightly tighter padding */
            display: flex; 
            flex-direction: column; 
            gap: 12px; /* Compressed gap for a shorter unit */
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); 
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { 
            font-family: Impact, sans-serif; 
            font-size: 28px; 
            color: #000; 
            text-align: center; 
            margin-bottom: 5px;
        }
        
        .section { 
            background: #0a0a0a; 
            border-radius: 10px; 
            padding: 12px; 
            border: 1px solid #000;
        }

        label { 
            color: #888; 
            font-size: 12px; 
            font-weight: 900; 
            text-transform: uppercase; 
            display: block; 
            margin-bottom: 8px;
        }

        textarea {
            width: 100%; 
            height: 140px; /* Reduced height to keep unit shorter */
            background: #001a00; 
            color: #00dd00; 
            border: 1px solid #111;
            padding: 12px; 
            font-family: 'Courier New', monospace;
            font-size: 19px; 
            resize: none; 
            border-radius: 6px;
            line-height: 1.3;
        }

        .controls-grid { 
            display: flex;
            flex-direction: column; 
            gap: 10px; 
        }

        .inc-row { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            justify-content: center;
        }

        .inc-btn { 
            width: 48px; /* Slightly smaller buttons to save vertical space */
            height: 48px; 
            background: #2a2a2a; 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 8px; 
            font-size: 24px; 
            font-weight: bold;
        }
        
        .inc-btn:active { background: #444; }

        .inc-value { 
            min-width: 70px;
            text-align: center; 
            color: #00dd00; 
            font-family: monospace; 
            font-weight: bold; 
            font-size: 22px; 
        }

        select { 
            width: 100%; 
            padding: 12px; 
            background: #000; 
            color: #fff; 
            border: 1px solid #333; 
            border-radius: 6px; 
            font-size: 16px;
        }

        .btn-group { 
            display: flex; 
            gap: 8px; /* Narrower gap */
            margin-top: 8px; 
        }

        button.action { 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #222; 
            color: #fff; 
            font-weight: bold; 
            font-size: 14px; 
            text-transform: uppercase;
        }

        button.speak-btn { flex: 2; } /* Speak button is wider */
        button.clear-btn { flex: 1; }  /* Clear button is narrower */

        button.primary { 
            background: #555; 
            border-color: #777;
        }
        
        #status { 
            background: #000; 
            color: #00aa00; 
            font-family: monospace; 
            font-size: 12px; 
            padding: 10px; 
            text-align: center; 
            border-radius: 6px;
            border: 1px solid #1a1a1a;
        }
    </style>
</head>
<body onclick="initVoices()" ontouchstart="initVoices()">

<div class="container">
    <h1>dPaul TTS</h1>

    <div class="section">
        <label>Input</label>
        <textarea id="textInput" placeholder="Tap screen, then type..."></textarea>
        <div class="btn-group">
            <button class="action primary speak-btn" onclick="speak()">SPEAK</button>
            <button class="action clear-btn" onclick="document.getElementById('textInput').value=''">CLEAR</button>
        </div>
    </div>

    <div class="controls-grid">
        <div class="section">
            <label>Voice</label>
            <select id="voiceSelect"><option>TAP TO LOAD...</option></select>
        </div>

        <div class="section">
            <label>Speed</label>
            <div class="inc-row">
                <button class="inc-btn" onclick="adjust('rate', -0.1)">-</button>
                <div class="inc-value" id="rateVal">1.0</div>
                <button class="inc-btn" onclick="adjust('rate', 0.1)">+</button>
            </div>
        </div>

        <div class="section">
            <label>Pitch</label>
            <div class="inc-row">
                <button class="inc-btn" onclick="adjust('pitch', -0.1)">-</button>
                <div class="inc-value" id="pitchVal">1.0</div>
                <button class="inc-btn" onclick="adjust('pitch', 0.1)">+</button>
            </div>
        </div>
    </div>

    <div id="status">LOCKED: TAP SCREEN</div>
</div>

<script>
    const synth = window.speechSynthesis;
    let voices = [];
    let params = { rate: 1.0, pitch: 1.0 };
    let initialized = false;

    function initVoices() {
        if (initialized) return;
        const wake = new SpeechSynthesisUtterance(" ");
        wake.volume = 0;
        synth.speak(wake);
        refreshVoices();
        initialized = true;
    }

    function refreshVoices() {
        const allVoices = synth.getVoices();
        voices = allVoices.filter(v => v.lang.toLowerCase().includes('en'));
        const select = document.getElementById('voiceSelect');
        if (voices.length > 0) {
            select.innerHTML = '';
            voices.forEach((v, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = v.name.replace('Google ', '').replace('Apple ', '');
                select.appendChild(opt);
            });
            document.getElementById('status').textContent = "SYSTEM READY";
        }
    }

    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;
    setInterval(() => { if (voices.length === 0) refreshVoices(); }, 1500);

    function adjust(type, amt) {
        params[type] = Math.max(0.1, Math.min(2.0, params[type] + amt));
        document.getElementById(type + 'Val').textContent = params[type].toFixed(1);
    }

    function speak() {
        const text = document.getElementById('textInput').value;
        if (!text || voices.length === 0) return;
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.voice = voices[document.getElementById('voiceSelect').value];
        utter.rate = params.rate;
        utter.pitch = params.pitch;
        utter.onstart = () => document.getElementById('status').textContent = "SPEAKING...";
        utter.onend = () => document.getElementById('status').textContent = "SYSTEM READY";
        synth.speak(utter);
    }
</script>
</body>
</html>

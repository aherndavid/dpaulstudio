<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dPaul TTS</title>
    <script src="https://unpkg.com/sam-js@0.3.1/dist/sam.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { min-height: 100%; background: #131413; color: #fff; font-family: -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; padding: 15px; overflow-y: auto; }

        .container {
            width: 100%; 
            max-width: 380px; 
            min-width: 300px;
            background: linear-gradient(145deg, #4a0a0a, #6a1010);
            border-radius: 18px; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-family: Impact, sans-serif; font-size: 24px; color: #000; text-align: center; margin-bottom: 2px; }
        
        .section { background: #0a0a0a; border-radius: 10px; padding: 12px; border: 1px solid #000; width: 100%; }
        label { color: #888; font-size: 11px; font-weight: 900; text-transform: uppercase; display: block; margin-bottom: 8px; }

        textarea {
            width: 100%; height: 100px; background: #001a00; color: #00dd00; 
            border: 1px solid #111; padding: 10px; font-family: 'Courier New', monospace;
            font-size: 18px; resize: none; border-radius: 6px; display: block;
        }

        .btn-row { 
            display: flex; 
            width: 100%;
            gap: 10px; 
            margin-top: 10px;
            height: 50px; 
        }

        .speak-btn { width: 65%; } 
        .clear-btn { width: 35%; } 

        .controls-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        
        .inc-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .inc-btn { width: 45px; height: 45px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 8px; font-size: 22px; line-height: 1; }
        .inc-value { font-family: monospace; font-weight: bold; font-size: 20px; color: #00dd00; }

        select { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #333; border-radius: 6px; font-size: 15px; height: 45px; }

        button.action { 
            height: 100%; border-radius: 8px; border: 1px solid #444; 
            background: #222; color: #fff; font-weight: bold; 
            font-size: 13px; text-transform: uppercase; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        button.speak-btn { background: #555; }
        button.clear-btn { background: #400; border-color: #700; color: #ff9999; }
        
        .export-btn { 
            background: #1a3a1a; color: #00ff00; border: 1px solid #00ff00; 
            width: 100%; height: 50px; margin-top: 5px; 
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; border-radius: 8px; text-transform: uppercase;
        }

        #status { background: #000; color: #00aa00; font-family: monospace; font-size: 12px; padding: 10px; text-align: center; border-radius: 6px; width: 100%; }
    </style>
</head>
<body onclick="initVoices()" ontouchstart="initVoices()">

<div class="container">
    <h1>dPaul TTS</h1>

    <div class="section">
        <label>Input</label>
        <textarea id="textInput" placeholder="Tap screen, then type..."></textarea>
        <div class="btn-row">
            <button class="action speak-btn" onclick="handleSpeak()">SPEAK</button>
            <button class="action clear-btn" onclick="document.getElementById('textInput').value=''">CLR</button>
        </div>
    </div>

    <div class="controls-grid">
        <div class="section">
            <label>Voice</label>
            <select id="voiceSelect"><option value="retro">RETRO: Speak & Spell</option></select>
        </div>

        <div class="section">
            <label>Speed</label>
            <div class="inc-row">
                <button class="inc-btn" onclick="adjust('rate', -0.1)">-</button>
                <div class="inc-value" id="rateVal">1.0</div>
                <button class="inc-btn" onclick="adjust('rate', 0.1)">+</button>
            </div>
        </div>

        <div class="section">
            <label>Pitch</label>
            <div class="inc-row">
                <button class="inc-btn" onclick="adjust('pitch', -0.1)">-</button>
                <div class="inc-value" id="pitchVal">1.0</div>
                <button class="inc-btn" onclick="adjust('pitch', 0.1)">+</button>
            </div>
        </div>
    </div>

    <button class="export-btn" onclick="handleExport()">⬇ EXPORT WAV</button>
    <div id="status">TAP SCREEN TO LOAD</div>
</div>

<script>
    const sam = new SamJs();
    const synth = window.speechSynthesis;
    let voices = [];
    let params = { rate: 1.0, pitch: 1.0 };
    let initialized = false;

    function initVoices() {
        if (initialized) return;
        const wake = new SpeechSynthesisUtterance(" ");
        wake.volume = 0;
        synth.speak(wake);
        refreshVoices();
        initialized = true;
    }

    function refreshVoices() {
        const allVoices = synth.getVoices();
        voices = allVoices.filter(v => v.lang.toLowerCase().includes('en'));
        const select = document.getElementById('voiceSelect');
        if (voices.length > 0) {
            select.innerHTML = '<option value="retro">RETRO: Speak & Spell</option>';
            voices.forEach((v, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = v.name.replace('Google ', '').replace('Apple ', '');
                select.appendChild(opt);
            });
            document.getElementById('status').textContent = "SYSTEM READY";
        }
    }

    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

    function adjust(type, amt) {
        params[type] = Math.max(0.1, Math.min(2.0, params[type] + amt));
        document.getElementById(type + 'Val').textContent = params[type].toFixed(1);
    }

    async function handleSpeak() {
        const text = document.getElementById('textInput').value;
        const voiceIdx = document.getElementById('voiceSelect').value;
        if (!text) return;

        if (voiceIdx === 'retro') {
            document.getElementById('status').textContent = "SYNTHESIZING...";
            const samConfig = { speed: Math.round(params.rate * 72), pitch: Math.round(params.pitch * 64) };
            const buf = await sam.buf(text, samConfig);
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createBufferSource();
            const audioBuffer = audioCtx.createBuffer(1, buf.length, 22050);
            audioBuffer.getChannelData(0).set(Array.from(buf).map(v => (v - 128) / 128));
            source.buffer = audioBuffer;
            source.connect(audioCtx.destination);
            source.start();
        } else {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.voice = voices[voiceIdx];
            utter.rate = params.rate;
            utter.pitch = params.pitch;
            synth.speak(utter);
        }
    }

    function handleExport() {
        const text = document.getElementById('textInput').value;
        if (!text) return;
        const samConfig = { speed: Math.round(params.rate * 72), pitch: Math.round(params.pitch * 64) };
        sam.download(text, samConfig);
    }
</script>
</body>
</html>

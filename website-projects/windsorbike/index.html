<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windsor Bike — Last Century Cycling</title>
  <meta name="description" content="Windsor Bike — vintage and classic racing bicycles for sale in Windsor. Sales, servicing, spares and clothing.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Righteous&family=Lobster&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Righteous&family=Lobster&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap"></noscript>
  <link rel="preload" href="assets/cyclist-1.webp" as="image">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #5B1FA0;
      --tan: #C4A882;
      --cream: #F5F0E8;
      --ink: #1a1018;
    }

    body {
      overflow-x: hidden;
      background: var(--purple);
      font-family: 'Libre Baskerville', serif;
      color: var(--ink);
    }

    /* ── NAV ── */
    .site-header {
      background: var(--purple);
      border-bottom: 4px solid var(--tan);
      height: 80px;
      position: sticky;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
    }

    .header-inner {
      padding: 0 3rem 0 3rem;
      height: 100%;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }

    .logo-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1;
      text-decoration: none;
      flex-shrink: 0;
      margin-top: 0;
      padding-top: 0;
      border-top: none;
      width: auto;
    }

    .logo-right .logo-main {
      font-family: 'Lobster', cursive;
      font-size: 1.6rem;
      color: var(--cream);
      letter-spacing: 0.02em;
    }

    .logo-right .logo-sub {
      font-family: 'Righteous', cursive;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--tan);
      margin-top: 2px;
    }

    .main-nav {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0.1rem;
      margin-left: 0;
    }

    .nav-link {
      font-family: 'Righteous', cursive;
      font-size: 1.45rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      padding: 0.45rem 0.7rem;
      border-bottom: 3px solid transparent;
      border-left: none;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .nav-link:hover { color: var(--tan); border-bottom-color: var(--tan); }
    .nav-link.active { color: var(--tan); border-bottom-color: var(--tan); }

    .nav-link.cta {
      background: var(--tan);
      color: var(--purple);
      border-bottom: none;
      border-left: none;
      margin-left: 0.75rem;
      margin-top: 0;
      padding: 0.45rem 1.2rem;
      width: auto;
    }

    .nav-link.cta:hover { background: #d9c4a3; }

    /* ── HERO ── */
    /*
      Full viewport canvas. Text block sits left-of-centre,
      image sits right-of-centre. They meet in the middle.
    */
    .hero {
      background: var(--purple);
      height: calc(100vh - 80px);
      position: relative;
      overflow: hidden;
    }

    /* Text — positioned to sit upper-left of centre */
    .hero-text {
      position: absolute;
      top: 18%;
      left: 5%;
      z-index: 3;
    }

    .hero-shop-name {
      font-family: 'Lobster', cursive;
      font-size: clamp(3rem, 7vw, 5rem);
      color: var(--tan);
      line-height: 1;
      margin-bottom: 1rem;
    }

    .hero-title {
      font-family: 'Lobster', cursive;
      font-size: clamp(3rem, 6vw, 6.5rem);
      color: var(--cream);
      line-height: 1;
    }

    .hero-title em {
      color: var(--tan);
      font-style: normal;
    }

    /* Rotating background slideshow */
    .hero-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      z-index: 1;
    }

    .hero-slide.active { opacity: 0.55; }

    /* Desktop — hide hamburger */
    .nav-toggle { display: none; }

    /* ── RESPONSIVE ── */

    /* Tablet — 768px to 1024px */
    @media (max-width: 1024px) {
      .header-inner {
      padding: 0 3rem 0 3rem;
      height: 100%;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }
      .nav-link {
      font-family: 'Righteous', cursive;
      font-size: 1.45rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      padding: 0.45rem 0.7rem;
      border-bottom: 3px solid transparent;
      border-left: none;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
      .nav-link.cta {
      background: var(--tan);
      color: var(--purple);
      border-bottom: none;
      border-left: none;
      margin-left: 0.75rem;
      margin-top: 0;
      padding: 0.45rem 1.2rem;
      width: auto;
    }
      .logo-right .logo-main { font-size: 1.3rem; }

      /* Index hero */
      .hero-text { left: 3%; top: 5%; }
      .hero-shop-name { font-size: clamp(3.5rem, 8vw, 6rem); }
      .hero-title { font-size: clamp(2.2rem, 5vw, 4.5rem); }
      .hero-img { left: 35%; height: 80%; }

      /* Grids */
      .bikes-grid { grid-template-columns: repeat(2, 1fr); }
      .spares-grid { grid-template-columns: 1fr; }
      .clothing-grid { grid-template-columns: 1fr; }
      .servicing-layout { grid-template-columns: 1fr; }
      .contact-wrap { grid-template-columns: 1fr; }
    }

    /* Mobile — up to 767px */
    @media (max-width: 767px) {
      .header-inner { padding: 0 1.25rem; }

      .logo-right .logo-main { font-size: 1.1rem; }
      .logo-right .logo-sub  { font-size: 0.55rem; }

      .nav-toggle {
        display: block;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0.5rem;
        flex-shrink: 0;
      }

      .nav-toggle span,
      .nav-toggle span::before,
      .nav-toggle span::after {
        display: block;
        width: 26px;
        height: 2px;
        background: var(--cream);
        position: relative;
        transition: all 0.25s;
      }

      .nav-toggle span::before,
      .nav-toggle span::after {
        content: '';
        position: absolute;
        left: 0;
      }

      .nav-toggle span::before { top: -8px; }
      .nav-toggle span::after  { top:  8px; }

      .main-nav {
        display: none;
        position: absolute;
        top: 80px;
        left: 0;
        width: 100%;
        background: var(--purple);
        flex-direction: column;
        align-items: flex-start;
        padding: 1rem 1.5rem 1.5rem;
        gap: 0.25rem;
        border-bottom: 3px solid var(--tan);
        z-index: 99;
      }

      .main-nav.open { display: flex; }

      .nav-link {
        font-size: 1.2rem;
        width: 100%;
        border-bottom: none;
        white-space: normal;
        padding: 0.5rem 0;
      }

      .nav-link.cta {
        margin-left: 0;
        margin-top: 0.5rem;
        width: fit-content;
        border-bottom: none;
      }

      /* Index hero — stack vertically */
      .hero { height: auto; min-height: calc(100svh - 80px); overflow: visible; }
      .hero-text { position: relative; top: auto; left: auto; padding: 2.5rem 1.5rem 0; z-index: 2; }
      .hero-shop-name { font-size: clamp(3rem, 12vw, 5rem); }
      .hero-title { font-size: clamp(2rem, 8vw, 3.5rem); }
      .hero-img {
        position: relative;
        top: auto; left: auto;
        width: 90%;
        height: auto;
        max-height: 60vw;
        object-fit: contain;
        display: block;
        margin: 1.5rem auto 0;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <button id="navToggle" class="nav-toggle" aria-label="Toggle menu"><span></span></button>
      <nav class="main-nav">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="current-bikes.html" class="nav-link">Current Bikes</a>
        <a href="spares.html" class="nav-link">Spares</a>
        <a href="servicing.html" class="nav-link">Services</a>
        <a href="clothing.html" class="nav-link">Clothing</a>
        <a href="news.html"          class="nav-link">News</a>
        <a href="contact.html"       class="nav-link cta">Contact</a>
      </nav>
      <a href="index.html" class="logo-right">
        <span class="logo-main">Windsor Bike</span>
        <span class="logo-sub">Last Century Cycling</span>
      </a>
    </div>
  </header>

  <section class="hero">
    <div class="hero-slide active" style="background-image: url('assets/cyclist-1.webp')"></div>
    <div class="hero-slide" style="background-image: url('assets/cyclist-2.webp')"></div>
    <div class="hero-slide" style="background-image: url('assets/cyclist-3.webp')"></div>
    <div class="hero-slide" style="background-image: url('assets/cyclist-4.webp')"></div>
    <div class="hero-slide" style="background-image: url('assets/cyclist-5.webp')"></div>
    <div class="hero-slide" style="background-image: url('assets/cyclist-6.webp')"></div>
    <div class="hero-slide" style="background-image: url('assets/cyclist-7.webp')"></div>
    <div class="hero-slide" style="background-image: url('assets/cyclist-8.webp')"></div>
    <div class="hero-text">
      <p class="hero-shop-name">Windsor Bike</p>
      <h1 class="hero-title">Last<br>Century<br><em>Cycling.</em></h1>
    </div>
  </section>

  <script>
    const toggle = document.getElementById('navToggle');
    const nav    = document.querySelector('.main-nav');
    if (toggle) {
      toggle.addEventListener('click', () => nav.classList.toggle('open'));
    }

    const slides = document.querySelectorAll('.hero-slide');
    let current = 0;
    setInterval(() => {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, 30000);
  </script>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Windsor Bike &nbsp;|&nbsp; 11 St. Leonards Road, Windsor SL4 3BN</p>
    <p><a href="terms.html">Terms &amp; Conditions</a></p>
  </footer>

  <style>
    .site-footer {
      background: var(--ink, #1a1018);
      border-top: 3px solid var(--tan, #C4A882);
      padding: 1.25rem 3rem;
      text-align: center;
      font-family: 'Righteous', cursive;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      color: rgba(245,240,232,0.5);
    }

    .site-footer a {
      color: var(--tan, #C4A882);
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.2s;
    }

    .site-footer a:hover { opacity: 1; }
  </style>
</body>
</html>
